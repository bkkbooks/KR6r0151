body:
  text: 金臺大慈恩寺西域師子比丘述注評議第九此篇評論禮儀之節故曰評儀客曰黃帝垂衣而縉紳之服備留於世間而化利天下也故衣冠始治於黃帝素王制禮而曲躬之貌形焉素空也言孔子有君師之德無君師之位左傳序云夫子作春秋為素王左丘明傳春秋為素臣故禮樂始興於孔子服為三德之初孝經云非先王之法服不敢服非先王之德行不敢行非先王之法言不敢道三德惟服最先故曰初貌列五事之首尚書云一曰貌二曰言三曰視四曰聽五曰思注云貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作又明作哲聰作謀睿作聖五事惟貌最先故曰首子路遇難不忘結纓纓繫冠之帶也子路遇衛太子難結纓正冠而死雖困而不廢其冠冕原憲雖貧不離華冕原憲魯人貧居破屋常戴其冠子貢過之曰病甚憲曰吾聞無財為貧道不行為病吾貧也非病也今之沙門剃鬚髮衣緇袍衣音義穿也緇黑色袍大衣也外無跪起之儀內絶溫恭之禮先王之制得不違乎外於君王處無跪拜之禮儀內於父母處無溫和恭敬之禮貌將其古先哲王制作之法不行焉得不違背乎妙明曰甚矣子之不達也其過也此責客問甚不通達於理也古者蛇身虎鼻之君牛首龍鱗之聖伏羲蛇身龍麟禹王虎鼻神農牛首皆聖君也啖羶飲臭啖食也羶腥也臭肉之壞也燧人氏以前無火人以生肉新血而為食今祭祀用牲然衣羽衣皮衣俱去聲黃帝已上未有衣服皆用禽獸毛羽皮為衣夏則居橧巢橧音曾鳥巢也上古聖人無屋夏則居鳥巢冬則居營窟營造作也冬則居造作窟穴而住道崇質朴論道也則崇敬德尚清虛論德也則尊尚於清虛無為也未知溫恭跪起之儀不識章甫縉紳之美章甫禮冠故宓羲被髮而足不躡履被髮跣足神農露頂而首不加冠頭無冠冕當是時豈有簪纓冕服之飾也哉結上文皆是聖德之君無為之道化利天下焉有簪纓冕袞服而為莊飾也哉而六經諸子稱其至德未聞以冠冕之闕責其非理也昔魯哀公問於孔子曰舜冠何冠冠上去聲下平聲問舜帝戴何冠也孔子不對公曰寡人有問吾子不對其意何耶寡少也此國君謙辭言少德也孔子曰以公之問不及於大方思其所對而對之子曰因見公問其語不大方才思其所對之辭公曰奚為非大公言何為不大孔子曰舜之為君也其德好生而惡殺惡音誤嫌也舜為君以德化民好愛生成嫌惡殺戮其政任賢而去不肖去上聲不肖不賢也行政則選任賢德去其不賢明並日月德明比並如日月也化行若神風化大行感應如神龜鳳呈祥麟龍叶瑞麟鳳龜龍謂之四靈王者之嘉瑞國有聖王則現公獨以冠冕而問故非大也若冠冕之問不是國政之大事也夫如是則道德禮樂在乎人之所為也蓋道德禮樂皆在當時人君之所作為也非章甫冠冕之所致也老子云失道而後德道自然也德猶得也道衰以德化之故失道而後德失德而後仁仁者有愛利之心故德衰以行仁故曰失德而後仁失仁而後義義者有斷制之心仁心衰而以行義故曰失仁而後義失義而後禮禮者有強民之意由義衰而用禮故曰失義而後禮夫禮者忠信之薄而亂之首言禮者非合無為之道也故老子所謂禮者忠信之薄而亂之首也言不務其內而修飾其外故禮則出乎人偽也是以聖德之君用無為之道化利天下上古有道聖德之君用無作無為之道化美於天下由道亡德失而後尚仁至於仁亡而義失又則尚其禮也故老子所言禮者身外莊飾之虛偽也奚拘於禮節乎何拘執於禮貌小節之莊飾者乎禮者敬而已矣禮者恭敬之儀已矣敬在乎心故敬之禮出乎本心而非在乎冠冕也不是冠冕能生敬禮也夫聖人之道豈直局於儀飾而已矣夫上古聖君用敦德賢朴行道以化民豈直以局在冠冕儀飾而已矣故孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉敬而將之以玉帛則為禮和而發之以鐘鼓則為樂若遺其本而專其末豈禮樂之謂哉禮主敬非但崇於玉帛所貴乎安上治民也禮所以辨上下定民治故安上治民莫加於禮樂主和非獨在於鐘鼓所貴乎移風易俗也樂所以在治而和民聲故移風易俗莫加於樂故君子不可小知而可大受也君子者成德之稱不以微小之知可許受之以大也然聖人所制歷代服飾以中國之民行中國之禮者雖不可廢也黃帝制衣服周公制禮樂以此莊飾化利中國之民行中國之禮然雖不可以廢之而為離塵之士蹈象外之高行者又奚能倣之哉蹈高蹈也倣者詩角弓章云爾之教矣民胥效矣注曰王位在德元風俗之樞機也教則民效其甚速若離塵寰之高士萬象之外而行高遠之行又何直用倣效此曲躬冠冕之禮以局哉且酈生長揖於帝高漢高祖嘗詔秦之隱士酈生名食其至賜晏罷已見侍女為帝洗足以帝不重賢遂不拜長揖而曰謝筵中之正座食音異其音基許由拒命於帝堯莊子讓王篇堯讓天下與許由由拒命不至河上坐見漢文列仙傳漢文帝好道德嘗使使問義於河上公公曰道高德貴不可遙聞後帝親幸其庵河上坐見於帝諸葛臥傲先主史記諸葛孔明隱居南陽草廬徐庶薦於先主先主往見孔明睡而不起斯皆道光四海德被諸方自古稱之以為高尚尚猶上也亦未見以跪起之闕責其非儀也闕少也此標前之所問謂已上數人亦未見跪起之闕少責其非儀也今之沙門道崇敦信志慕無為今之僧人習佛祖之風道崇高遠而敦厚信實決志深慕無為之道內不禮家君家君父也外不拜人主人主者國王也方河上之輩亦以類矣有德高僧比河上之等輩亦皆同類矣以此觀之自古賢德猶有高居井里嘯傲雲山孟子九百畝為井田五鄰為里歷觀古之賢人德士慕其道也或高隱於井里或嘯傲避世而隱雲山之間天子莫得而臣王侯莫得而友禮記儒行篇曰儒有上不臣天子下不事諸侯莊子天道篇曰曾子居衛天子不得臣諸侯不得反故養志者忘形養形者忘利致道忘心矣禮義制度不可得而拘也結上文天子莫得臣諸侯不得友者之意豈可拘於禮儀制度也哉而況象外之教乎何況沙門乃出塵象外之聖教者乎是以君子隨其所宜無適不可是故君子惟義是從但有所宜者無適而不可也豈區區冠冕禮儀而能禦哉區區小貌舉問第十此篇舉喻異事而問故曰舉問也客曰季路問事鬼神季路子路也子曰未能事人焉能事鬼曰敢問死子曰未知生焉知死論語注曰晝夜者死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也或言夫子不告子路不知此所以深告之也此聖人所絶也此孔聖人絶不言之事也今佛教輒説生死往來之事鬼神報應之徵今釋教專説生死往來虛誕之事吾恐此非聖哲之語也孟子曰大而化之謂之聖書云知之曰明哲謂知道者也故客曰我恐此佛之道不是聖哲真誠之語也夫履道者當含和蘊素夫行履此道者當要包含沖和蘊積純素篤信務實篤者純厚也信者誠實也務者專力於事也誠者誠信無妄之謂唯純厚誠而務實也何必説生死以亂其心言鬼神而惑其志也若含和蘊素篤信務實者又何用談説生死而亂其心言論鬼神而迷惑其志也妙明曰子之所言可謂見外而未見其內責客曰子能見他外教中説生死鬼神之事不見自己教中亦有所言之事中庸子曰鬼神之為德也太極圖曰原始反終故知生死之説注曰始處是生言生之初終處是已言已定説死求近而不求其遠也只求淺近之事而不求深遠之理也以子路性氣剛烈暴虎憑河不善攝生故曰未知生焉知死憑音平以子路躁性勇氣剛強猛烈暴虎者空拳而搏也憑河者非舟而度也不善權權輔生故曰未能事人焉能事鬼未知生焉知死此蓋責子路之辭也胸臆崛起崛魚勿切特起之意謂子路胸臆高起縱肆之貌言無卑讓人事尚然不能如何能知鬼神之事是孔子抑而遏之豈盡實之言乎孔子抑按止絶而遮遏之意豈是實無鬼神之説乎孔子曰非其鬼而祭之諂也論語孔子謂非其鬼者謂不當祭之鬼如祭之者諂也求媚也人神曰鬼伸而生之為神曲而死之為鬼鬼之言歸也至而伸者為神反而歸者為鬼人之魂魄所歸往也春秋左傳曰人生始化為魂既生魄陽曰魂淮南子曰天氣為魂地氣為魄禮記曰魂氣歸於天體魄復於地蓋魂者神也陽也氣也魄者精也陰也形也結上文人之魂魄所歸而往反者也言其非祖考鬼神而祭者諂求也祖及父亡之皆稱為考言不是自己祖考之魂神祭之者諂求也又曰為之宗廟以鬼享之三年喪畢神主以立於家廟以鬼神之禮於春秋之時而享之春秋祭祀以時思之春之雨露既濡秋之霜露既降皆舉祭祀之禮由寒暑變移展其孝思也又曰生時愛敬父母在生則事之以愛敬死事哀戚父母既死則事之以哀戚又曰喪則致其哀父母死喪則致其哀戚祭則致其嚴歲時祭祀則盡其嚴肅又曰周公郊祀后稷以配天后稷周公始祖昔者周公攝政因行郊天之祭以始祖后稷則配天享之宗祀文王於明堂以配上帝文王周公父也明堂天子布政之宮周公因祭上帝於明堂乃尊父以配享之此宗廟文王嚴父以配上帝也又曰生則親安之自天子至於庶人皆得歡心則父母生而安其榮養祭則鬼享之父母死而為鬼則享其祭祀也又曰天地明察神明彰矣事天明即父乃合天道也事地察即母乃合地道也既有是孝則天地神明之理甚彰著矣又曰宗廟致敬鬼神著矣能致敬於宗廟則宗廟鬼神之理甚彰著矣孝悌之致通於神明孝悌之道致其所至幽則可以感通於神明又曰生事之以禮父母生存則愛敬以禮死葬之以禮父母既亡則葬之以禮祭之以禮父母既葬則祭之以禮又曰禹吾無間然矣菲飲食而致孝乎鬼神間去聲菲薄也論語孔子謂禹王所行之事吾無指點有罅隙能致孝乎鬼神謂享祀豐潔薄自口體厚祀鬼神也禮記有祭統祭儀唯言配天祀帝享祖嚴親奉神事鬼之道結上文意禮記中有祭之儀軌今以引之而為證唯者獨也不謂獨祀上帝享祖宗祭神奉鬼之道非也只是責子路氣質剛勇不能辭讓誠意之辭豈絶人事神鬼而知生死哉子獨不知之乎責客獨不知此理者乎但孔聖言其髣佛但以夫子之言略有倣佛相似而已如來剖其幽微明發因果備陳報應植善崇福種惡獲殃派天下以歸其善如來之教能剖發明因果之實備細陳白種植善因判於幽深微細則崇敬於福報之應種植惡因則自得於殃禍之應以此分派天下之事莫不歸於善道也尚書云作善降之百祥作不善降之百殃周易云積善之家必有餘慶積不善之家必有餘殃此善惡報應之説甚分明矣豈獨以佛家好言鬼神事乎結上文意豈獨以吾佛好説善惡鬼神報應之事乎夫如是何儒釋相違之有哉如上皆孔子之教明其生事死葬配天祀帝享祖嚴親奉鬼神之道若此則儒釋之教何有相違悖也哉解域第十一此篇以別夷夏之域而不同故曰解域也客曰仲尼云夷狄之有君不如諸夏之亡也亡古無字論語謂且夷狄有君長不如諸夏之僭亂反無上下分蓋孔子傷時君之亂而歎也雖有其君不行其道非實無也孟子曰吾聞以夏變夷者未聞變於夷者也此責陳相許行用諸夏之禮儀變為蠻夷者也且吾子曩時學二帝三王之道六經諸子之書今更捨之反學西域之言不亦陋乎反者不合也反以學西域佛之言教為之鄙陋者乎妙明曰吾昔未見大聖人微旨之時亦嘗出此語與子所見不相遠也今則不然若子可謂知禮樂之華而暗道德之實窺爝火之照而未覩日月之明也暗幽也昧也爝火者小火把也今若許子可為曉知禮樂之光華而暗昧道德之真實者何異莊子云日既出矣而爝火不息其於照也不亦難乎謂客之所見於小火而未見日月之明也孔子所語疾時君之廢禮孟子譏陳相之專農意有所主理非決然謂孔子傷昔時人君之亂而壞禮孟子所言許行陳相之見反變為蠻夷昔孔子欲居九夷論語注東方有九種夷後漢東夷傳曰畎夷於夷方夷黃夷白夷赤夷玄夷風夷陽夷欲居之者乃明乘桴浮於海之意也或曰陋如之何子曰君子居之何陋之有君子居之則化何鄙陋之有及仲尼周流天下而時君莫行其道及至夫子周流七十餘國欲行先王之仁政故當時國君皆無行其道者孟子思濟斯民而諸侯無聽其説孟子亦遊諸國説行仁君之政思濟斯民諸侯亦不聽其説豈為陋西域之術而弗用也耶若孔子疾時君之廢禮孟子譏陳相之專農而諸侯不聽其説豈是鄙陋西域之教而不用耶夫姬文姒禹君之聖者也日磾由余臣之賢者也斯皆生於夷狄日音密磾音低姬文王姓姒禹王姓文王生於西邠禹王生於石佃二聖俱生於夷邦於中國行仁君之化仁君之政未見言其廢政也金日磾漢文帝時忠臣番人也有賢人之德由余始皇帝時入秦之界使亦賢人也若文王禹王金日磾由余等明君賢臣俱係夷狄之人也太康周幽君之荒者也史記太康啓之子禹王孫也好畋獵尚書云內作色荒外作禽荒酣酒嗜音峻宇雕牆荒淫其甚若此其國未或不亡也史記周幽王寵褒姒以不好笑幽王為烽火大鼓命曰若有寇至舉火則以救之幽王戲舉烽火諸侯悉至而無寇姒大笑幽王悅之後胡兵至王舉烽火諸侯不信意以為戲遂殺幽王於酈山之下而虜其褒姒也石趙嬴秦君之暴者也史記石趙即石勒也東晉元帝時專於殺戮史記嬴秦始皇也縱行無道吞併天下之凶暴也趙高李斯臣之佞者也佞讒佞也趙高宦官李斯相也二人皆始皇之臣殺太子扶蘇及二世胡亥侯景宇文臣之悖者也史記侯景梁武帝悖逆之臣困武帝於臺城而死宇文隋煬帝悖逆之臣殺煬帝於洛京斯皆生於中夏太康之下俱中夏而生也以是觀之豈得以封域而限賢愚之與美陋哉豈得直以封強之域所局限賢愚美陋夷夏之論哉且文命出西羌而聖哲尚書文命敷於四海禹王德號也西羌者今戎州界乃夷人也瞽臾生於中夏而頑嚚瞽臾舜父心不行先王德義之則為頑舜繼母口不道忠信之言為嚚文王生於西邠而修仁德文王生於西邠之邊而布仁政以修其德殷紂都於東洛而恣凶殘殷紂諡法殘義損善曰紂都於洛陽中原縱恣凶惡而殘害無道也黃帝道慕華胥列子云黃帝間居大庭齊心服形三月不親政事晝寢夢遊華胥之國後舉華胥之治老子義學天竺尊釋篇天竺有古皇先生即吾師也善入泥洹化遊天竺今已返神還乎無名絶身滅影不始不終綿綿若存吾今遊矣穆王過終北而忘返自鄙周室之弗如列子云周穆王北遊過其國三年忘返周室慕其國撇然自失不進酒肉不召嬪御數月乃復既返周室鄙嫌周國之治不如北之治也齊桓適遼口而忘歸自思齊國之不若列子云管仲勉齊桓公因遊遼口俱之其國幾剋舉隰朋諫曰君捨齊國之廣人民之衆山川之觀殖物之阜云自思齊國之不如於此也且北星之辰北斗七星之前有五星天文步天歌曰第一座名紫微星第二座太子星第三座庶子星第四座后宮星第五座天樞星以星言之為北辰也在天之中又步天歌中所謂天之中有三垣若品字而排第一紫微垣第二太微垣第三天市垣外有二十八宿分位兼諸餘星以理取之其辰正在天之中也在齊之北以此觀之齊魯漢魏之地未必為中也言北星辰在齊地分之北如此則齊國魯國魏國等亦未是中也若此以彼為西戎彼必以此為東夷矣假如此望彼天竺國為西戎彼必指此國為東夷之地也而又且孰為其中耶孰誰也若此則果以將誰國而為中國也自高天之所覆厚地之所載山川之廣邦域之多不可以億數而記算數曰十萬為億言天地之間山川廣大邦域盛多故不可以億萬之數而記之又焉知此為中乎彼為邊乎若此言之又何知此間為中國彼間為邊乎且佛經以三千大千世界為一化佛所王之寰宇也王去聲若君臨天下曰王經云三千小千世界為中千世界三千中千世界為一大千世界如三千大千世界為一化佛所掌寰區之宇也吾是以尊而學之以從其大我由是尊奉而學之故順從佛之廣大也夫金玉不相傷金玉之寶各有所貴何相傷害青碧不相妨青碧之色各有所用何相妨礙且大海一滴味具百川則喻大海一滴之水具全百川之味然百川混流入海故味則一也出世之道頗知則世間之道不勞而得矣但頗少知出世間之道則世間之道不待勞慮而知得矣夫如是則周孔之道其何捨之有耶非聖賢拘於夷夏而人自夷夏耳釋謗第十二此編解釋毀謗之疑故曰釋謗客曰吾聞持戒者防一切惡發一切善清淨無染不茹葷物客引釋氏戒法言我聞戒者凡一切惡事防護不可為一切善事可行決當發方為清淨不染又不可用五辛葷茹以是徵難今見沙門觸染梵行耽嗜酒漿梵語梵此云淨也客言今見僧染淨行耽著嗜愛於酒漿也權量商賈貿易貨殖稱為權尺為度斗斛為量行曰商坐曰賈交易市價曰貿改變無常曰易交財化物曰貨積聚財寶曰殖以此觀之豈無犯耶用此觀視豈不犯於戒律也耶妙明曰子之所言略近而忘遠取小以遺大也責客曰子所言之如略少近而忘其深遠而取小節忘其廣大也夫日月雖高而蝕陰陽志云日者衆陽之宗月者太陰之精以高而言則日月去地四萬餘繕那亦云由旬一由旬四十里如此之高尚有所蝕之患難也圭璧雖貴而瑕圭瑞玉也説文曰上圓而下方天子大朝以執之寶中最貴者也瑕者玉有赤色為瑕至貴之寶尚不免於瑕也公輸能授人之規矩不能使人巧而為之授與也公輸子名班魯之巧人也規所以為圓之器也矩所以為方之器也謂能授與人方圓之法而不能使人之巧妙而為之聖人能授人之戒律不能驅人履而行之佛聖雖能授與人戒法律儀固不能使人堅守不犯而行之臯陶能罪盜濫不能化貪夫為夷齊陶音姚舜賢臣雖有片言折獄之才不能勸化獄中盜濫之徒為伯夷叔齊之義讓呂刑能誅凶殘不能令惡子為曾閔尚書呂刑篇呂侯為天子之司寇周穆王命訓刑以告四方不能教化自子之惡成曾參閔子騫之孝行唐堯之聖哲不能化丹朱之愚尚書丹朱堯之子生而不肖故授禪與舜仲尼之仁賢不能遏盜跖之暴莊子盜跖柳下惠之弟無道凶虐橫行天下大國守城小國入堡孔子往教焉及回謂柳下季曰幾不免虎口之難舜德不澤商均諡法仁聖盛明曰舜商均舜之子無大人德遂禪位與禹周恩不霑管蔡管蔡成王二叔流言謗周公豈刑法之不峻而道德之不備者哉結上文皋陶呂刑之法豈不險峻堯舜周孔豈無道德而尚不能責盜濫化凶頑教子弟俱為賢孝之行也奚獨以茹葷嗜酒而見責耶何以獨將沙門食葷飲酒見責為過也在昔嚴陵垂釣嚴光字子陵南陽人光武故人王莽之亂隱釣於七里灘子牙直鉤子牙者姓薑名尚因紂無道隱於渭濱文王獵而得之遂拜為太公望破紂而立周買臣負薪朱買臣家貧常負薪讀書後為會稽太守昆吾陶瓦昆吾夏時造瓦之人後獲顯榮禹治溝洫禹導百川東入於海而萬姓免為魚鱉故功推於後世舜耕歷山歷山中條山之別名在河之東舜未遇時曾耕於此山相如臨邛而自酤臨卭地名司馬相如未遇時臨卭醞釀而賣後顯榮乘駟馬之車朱亥未遇而親屠朱亥未遇時親為屠後遇封信陵君是以君子達則兼濟天下不達則獨善其身若嚴陵子牙買臣昆吾禹舜相如朱亥等皆聖君賢臣身既通達則道兼濟於天下身未通達則獨守善其身也夫有生之最靈者人也天生萬物皆名有生人類最靈最貴者也人也者口非匏瓜焉能繫而不食論語匏瓜者即音互瓜也匏瓜繫於一處而不飲食人則不如是也身非木石焉能裸而不衣雖手足之健捷不足以逃其飢必資飲食而養其命毛髮以緻密不足以禦其寒必資衣以蔽其體故知衣食可以資身命身命可以資道業衣食既備可以資養身命身命既安則可以資助道業也苟衣食之不足而道業將就廢也諺語云人無根本水食為命苟者誠也誠若人無衣食而必絶乎身命也身命既絶道業豈不廢乎且修德者不樂坐食於人吾祖師有云一日不作一日不食直欲自營其衣食備歷於艱苦庶知世道之勞慮吾門諸祖直要自經營於衣食之備以歷於艱辛之苦庶以知世人耕織之道艱難則節儉其用也民力之辛酸辛酸者戚眉之貌男耕女織皆有辛酸之力然後進善履道捍拒生死捍抵也拒禦也既知世道之勞苦其所須而俱備然後則可以捍抵拒禦生死之事也蓋以出乎慚愧之心而伏乎驕慢之志不且失節謂之慚心無非用謂之愧凡衣食之用大概要知出處艱難則有慚愧之心而降伏乎驕傲怠慢之愚志也亦非不善之為也總結上文意如前所疑權量商賈等事亦不是不善之事豈獨以商貨而見譏乎豈獨用此商賈貨而為譏謗者乎是以君子之道或出或處或默或語用之則行舍之則藏是故君子所行之道於語默動靜之間可進則進可止則止不隘其情君子所行之事不以窄隘其情不淫其性亦不淫蕩其性其道貴於適用意所必從曰適君子之道無可無不可故曰適用而已豈一途而可盡哉聖人之道而有萬殊至則一也豈局於一途而可為盡善盡美也哉辨施第十三此篇為辨論捨施故曰辨施客曰孔子云禮與其奢也寧儉禮貴得中禮奢而備不若儉而不備之愈也又云奢則不遜儉則固與其不遜也寧固遜順也固陋奢俱失其中而奢之害也大老子曰是以聖人去甚去奢去泰去皆上聲老子所云甚奢泰三字皆是過中不當之義是以聖人去除甚過音樂奢過服食泰過宮室若無此三者則合中矣昔者楚靈王好奢卒至身亡史記楚靈王因建章華臺苦衰其民後被吳王所敗以致亡身秦政好奢終滅於國秦國號政治皇名也始皇乃莊襄王納大賈呂不韋妾有姬時已有娠而生政世謂始皇為呂政及即王位併吞六國一統天下自以謂德兼三皇功過五帝及更號曰皇帝故稱始皇帝專一刑威立國焚書坑儒暴虐不道好奢東海求仙崩於沙丘不三年而國滅矣今佛家以身命施為福之最用身命布施為得福最多以七寶施為福之次用金銀琉璃硨磲瑪瑙琥珀珍珠等七寶為施皆得福次矣喻之以善惡譬喻化人則用善以懲惡曉之以因果曉喻導人則用因以明果使人傾囊倒廩竭資而施以為祈福因以善則上天堂惡則墮地獄曉喻因果使人人盡其囊財罄其倉廩以為求福勸人為善也已而宏麗所居營葺不已飛樓疊閣金碧爭光不亦泰乎謂僧人自己所居之屋宏大之美麗纍年營造不已如飛揚之樓重疊之閣飾之以金碧爭光之色如此不亦奢泰者乎妙明曰子之所問知其流而未識其源責客曰只知聖人之所流不知聖人之根源也見其淺而未達其深仲尼疾時君之奢逸仲尼答林放之問曰禮與其奢也寧儉乃疾時君之奢逸故發此言也老子警人主之昏淫老子言去甚等辭乃警省人主當時之昏淫發此言也豈謂止布施之語哉孔老二聖發此言時佛教未流於此國豈是絶布施之説也昔者虞舜耕於歷山恩澤不霑於朋戚衣食不及於二親虞國舜都舜初耕於歷山漁於雷澤陶於河濱側陋微賤之時朋友親戚之處無恩惠之與霑父母之前無豐盛衣食之所養如此者何也蓋以未遇其時也太公釣於渭水財貨不周於妻孥惠施不霑於鄰里太公未遇之時釣魚於渭水之陽妻子尚不能周給何有惠施於鄰里者及其登九五之位易乾卦爻辭初九潛龍勿用舜在側陋便是潛龍九二見龍在田舜田漁時也九三君子終日乾乾舜玄德升聞時也九四或躍在淵舜之歷試時也九五飛龍在天舜即帝位也故曰登九五之位也應飛熊之夢史記西伯將出獵卜之曰所獲者非熊非羆非彪非虎羈王之輔果獲呂尚於渭水之陽與語大悅曰自吾先君太公嘗云當有聖人適周太公望子久矣故號太公望立為師也於後佐武王伐紂以康兆民塗炭之苦者非熊之兆夢也惠澤八方恩霑四海惠者惠施之利澤者澤潤也舜居君位無為而治天下也太公佐武王革紂之虐八方四方四維也四海東西南北四海也故八方四海之內生民皆獲其恩澤也但饒財則貴其惠施聖君賢臣豐饒則兼濟於天下窶乏則貴其履道窶其矩切窶乏貧窮也既貧而無位則貴乎安然而以行其道也子曰富而不施貧而無所救若富者不施物以濟之則貧者無所救拔昔趙盾饋食於靈輒卒感扶輪之酬史記趙盾晉臣嘗遊於桑間見餓人以食餉之盾好直諫一日晉君呼熬咬之又預脫去盾所乘之車去其一輪駟馬摘其二馬盾及升車而不能行倏有一人扶輪而行則脫其難遂問曰扶輪者誰答曰吾桑間餓人也為報一食之恩耳漂母餉飯於韓信終獲捧金之報史記漂絮也韓信布衣時嘗釣於城下漂母每飯至先餉於信後為齊王回鄉以捧黃金報恩於漂母也陰施出於不意陽報皎於白日陰暗也陽顯也皎明也若趙盾漂母飯施於無心之間後遇扶輪捧金之酬豈非陽報明於白日也況以傾家財發善意其所得福利巍如嵩泰濬如江海矣傾倒覆也濬深也如趙盾漂母一飯之恩尚獲扶輪捧金之報況於傾其家財而發其善心用於布施者所獲福利豈不巍大高廣如嵩山泰嶽濬深江海之浩瀚者矣故懷善應之以祥挾惡報之以殃種稻而得麥為禍而得福者未之有也作善獲福作惡遭疾定而不能改故種稻而得麥為惡而得福者未之有此事也今我沙門助人以福勸人以善以福助人以善誘人使施一梁一棟一香一華如影隨形凡令人施一件物者如影隨形之不遺也果嚴後世其善果必莊嚴於後世也豈獨以自處華室而取樂哉既化一切為善各得安樂豈獨以自處華屋而樂哉且靈王之奢也起章華之臺室盡人間之富貴金珠佩玉粲飾其間藏歌舞悅美人廢國政恣驕奢不其亡身其何耶若是貪淫嗜樂不至於廢國亡身者更在何耶秦政建萬人之宮秦政始皇也都咸陽建萬人之宮室於阿房之城東西五百步南北五十丈阿房城中有殿殿之四方有房其高廣者上可以坐萬人下可以建五丈旗東抵驪山僅五十里十步一樓五步一閣東至驪山西至咸陽將五十里除萬人宮外十步五步皆建樓閣車駕往來不冒風雨其宏麗雄贍如此之大也但知縱耳目之所欲而不知役人民之疲苦唯恣驕奢罔修國政不其滅國其在何耶今我沙門雖處華堂紺宇但以晨鐘夕梵遠風疏磬褒讚金言生人天福今我沙門雖以如是但用晨鐘暮鼓俾揚舉梵唄上乃祝皇王聖壽下乃與黎民祈福永遠闡揚于風化也如斯而已矣豈直與秦楚奢華同日而語耶孟子曰如其道雖舜受堯之天下不以為泰如舜乃側陋微賤因有其道德而堯授二女以妻之天下四海君位以禪之而亦不以為泰非其道一簟食不可受於人如是不合契道德之理雖有一簟之食亦不可坐受於人也豈虛言哉
