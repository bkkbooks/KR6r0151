body:
  text: 金臺大慈恩寺西域師子比丘述注曲而斷之謂折猶豫不決之謂疑評議難辨之謂論此論因妙明子居山時有客特詣請問以決所疑妙明子引三教微言以答之遂成是録故曰折疑敘問第一敘者敘其來因問者問其所疑第者次第也一者數之始也妙明子華州渭南縣洪福寺出家遇魚巖老人祥公處得法闡揚大乘經律論大元至正間詔封傳大乘戒賜紫閏大國師居石室後歸終南山石室隱居有客來謁妙明與之坐而問焉曰夫子何來尊美之稱曰夫子謂客因何事而來客曰有所請問而來客曰有所疑而來問妙明曰吾居是山也幾以數年而世罕知吾者我也幾者近也罕者少也謂我居此山將近十數年矣而世人少知加以懸石巉巖危嶠巇嶮無人履踐巉音讒險也巖積石貌嶠渠廟切山鋭而高也巇音羲嶺危也嶮音險音險也加以者兼有也懸石者纍垂可畏貌謂險難行之處少有往來故曰無人履踐也遠勞仁者一至此乎遠路勞煩仁者一徑來於此乎客曰雷霆之聲無欲聞人之耳而耳自聞淮南子曰雷者陰陽擊摶之聲感而為雷激而為霆雷聲豈要聞於人耳蓋人耳自皆聞之管籥之音無有悅人之心而心自悅樂譜云管者簫笛之屬籥者似笛而有三孔短小其管籥音聲無要歡悅於人心蓋人聞之則自然歡悅也夷齊匿迹於首陽不欲德稱於人而人自稱其德史記伯夷叔齊孤竹君之二子讓不嗣位欲之西南遇武王伐紂迎馬首而諫不從隱於首陽山誓不食周粟卒至餓死矣巢許韜光於箕岫豈為道揚於世而世自揚其道巢地名韜藏也莊子讓王篇曰堯以天下讓許由許由不受隱於箕岫山子之居山亦以類矣奚為人之不知也客以夷齊許由之德而比類何為人之不知也妙明曰子所欲問可得聞乎此審問辭客曰請無拒焉無禁止之辭子無阻而抵拒焉妙明曰子張云君子尊賢而容衆嘉善而矜不能我之大賢歟於人無所不容我之不賢歟人將拒我如之何其拒人也論語子夏門人問交於子張子張曰子夏云何對曰子夏曰可者與之不可者拒之子張曰異乎吾所聞君子尊賢而容衆云云蓋子夏之言迫狹子張譏之是也子張所言容字正破子夏拒字知則無拒此許答之辭也客曰噫噫者傷痛悲歎之辭吾與子皆儒也我與子皆曾為儒也豫昔嘗與子為方外友豫我也昔者往日也嘗曾也撤去籓籬出乎流俗之表曰方外也同志曰友獨以兵火之亂不得同地而處良可歎也獨者單也言單為兵亂而逃避分散也逃避不得同居良頗亦可悲歎也子下髮離俗其有年矣子落髮為僧離去俗家有多年矣嘗欲一往而見不果如願曾要專一來此見面不如願欲頃以稅駕塵習撥置人事姑乘少暇聿來高居欲折所疑莫知可否否音府否者審辭也頃者俄頃少時也以用也稅駕者農夫之具頃以脫鞅憩歇暫放下之義塵習者塵寰家務之習撥置者謂棄之於一邊人事者往來交接之事也姑且因乘少時間暇聿遂而來高隱之居欲以決折所疑之惑情莫知可許否妙明曰請試言之請試言所疑之辭客曰人云假借他人之言曩妙明儒時未嘗寄口於佛經曩昔也言往昔之日為儒時未嘗挂口於佛經今為釋也沈湎因果謂佛教也空寂之説今為釋子如沈貪酒色心迷意醉亦如湎波溺而不醒乃妄為因緣果報虛無空寂之論説遺棄周孔黃老之書不識有諸遺猶棄也謂遺棄周公孔子黃帝老聃之經書妙明曰子貢云君子一言以為知一言以為不知言不可慎也知皆音智論語陳子禽謂子貢曰子為恭也仲尼豈賢於子乎言謂恭者謂恭敬推遜其師也子貢曰君子一言以為知云云此責子禽不謹言也蓋一言善為智一言不善為不智智不知係於一言不可不謹慎也凡物自微至著緣淺及深微者細也小也著者盛也大也凡一切物自細小而至盛大緣者由也譬人入海由淺而以及其深也譬登萬仞之嶽不可一步而至必資下以及其高顏師古書曰七尺為仞嶽者山之高廣者也譬喻人登萬仞之山嶽不可一步便到必自下以至其高上既登絶頂所歷諸山豈曰棄哉既登絶高之頂觀經歷之衆山皆低未曾遺棄也吾始學周孔黃老之書抑以為極致我始初為學周孔等書之時抑以為至絶之處次撿佛經始知聖道有權實爾次因檢閲佛之經典始知聖道有權假真實之理故爾今吾以姬孔黃老之書為衆山姬周文王姓謂周孔黃老四聖之書喻如衆山以佛經第一義諦為絶頂第一義諦者教乘之極談也已達聖位者為真諦未脫凡情者為俗諦於時真俗不立凡聖情盡不著二邊唯存中道故曰第一義諦以此喻絶高之頂既登絶頂望衆山自遠矣何棄之有耶既明釋典如登絶高之頂復觀周孔等書如衆山而自遠矣何曾遺棄之有耶也聖生第二此篇言佛降誕之迹故曰聖生客曰佛之所生在何邦域其氏族顯迹及形貌德相所説法要可得聞乎佛之降生國土姓氏家族兼及形相所談妙法亦可得而聞乎妙明曰富哉問也發問之辭深遠廣大故曰富問也豫雖不敏略示所知以報吾子我雖不敏達略將少知用答子之問也自漢之西過數萬里自漢者指中華漢地也之者往也自漢地往西約有數萬里程途也有國曰迦維羅被有國土名迦維羅乃佛降誕之中國也王姓釋迦釋氏源流梵語釋迦此云能仁父名淨飯梵語首頭陀羅或云悅頭檀此云淨飯大夫人曰摩耶梵語摩耶此云大術佛本居兜率天宮梵語兜率陀亦名覩一史多此云知足也以先佛之迦葉般涅槃後佛當補處名曰護明梵語具云摩訶般涅槃那此云大滅度亦云大寂滅自迦葉佛涅槃之後佛補其一處特待出現之時實以三祇因滿一切諸佛皆修三祇之因也三祇者即三大阿僧祇劫也萬德果圓諸佛皆具萬德方為道果圓滿也宿願未周宿生有願未曾同圓故下生人間示同生滅示現受生滅身駕日輪香象託陰王宮初投胎時化現於日輪之中跨香象投託母胎於王宮以大夫人摩耶為母以周昭王甲寅二十四年四月八日當周之時正月建子即今二月八日是也毗藍園中右脅而生脅生者表異常流周書異記云昭王二十四年四月八日此方江河泛漲大地皆動光貫太微照自西方王即怪問群臣太史蘇由奏曰西方生大聖人也王曰於此何如由曰無事千年之後聲教傳流於此時乃刻銘於國之南郊以記之於時地搖六震六震即六種震動謂動踊震起吼擊也搖揚不安曰動𡑝瓏凹凸曰踊隱隱有聲曰震自下升高曰起砰磕發響曰吼打摶驚物曰擊然各有三直動名動四天下動名遍動盡大千動名等遍動餘五例此天雨四華雨音裕降也四華者曼殊沙華摩訶曼殊沙華芬陀梨華拘物頭華神捧金盤地神捧持金盤龍吐香露九龍吐其香水浴太子身即能縱行七步周回行七步七步蓮華皆生七步者表七種淨財亦名七德財即信進戒慚愧聞捨定慧七也目顧四方眼顧視於東西南北四方本行經云東方表涅槃最上南方表利樂衆生西方表解脫北方表永斷輪回一手指天一手指地曰天上天下唯吾獨尊目顧四方上下所指一則異於凡流二者發明大事因緣玩者於此動用之間自可消息具三十二大人相阿毗曇論云三十二相者梵音聲相眉間白毫相烏瑟尼妙相牛王睫相目紺青相廣長舌相得上味相齒牙鮮白相齒齊互密相具四十二齒相師子頷輪相立身摩膝相肩膊圓滿相師子身相廣洪直相處處充滿相皮膚細軟相常光一尋相身真金色相身毛右旋相孔生一毛相身毛上靡相身分圓滿相勢峯藏密相伊尼鹿王腨相足趺滿厚相手指網縵相手足細軟相足踉圓滿相纖長光澤相足千輻輪相足底平滿相八十種隨形好八十種好者指甲紅赤指甲隆起指甲清淨指甲滿足押甲團圓指甲纖直指間一密指清淨潔手足肥膩手足裏赤手足平等手足內滿掌文深現掌文端直掌文纖長手足潤澤掌文不亂踝足少現膝頭圓滿膝次第滿行步齊整師子王行鵝王步龍王行相牛王行相行不顧視行步不亂半身正直佛身過人一切滿足佛身皆好身體平正身體遍足身體正直身體滑澤身體淨潔身體端嚴身次第大小諸根方正身色不黑身體無黶身毛淨潔腹相團圓腹無橫文身體明淨臍正圓深臍孔團圓臍文右旋臍孔不凹臍孔不長臍孔不短臍孔不連得龍牙相牙不過脣四牙團圓四牙鋒利四牙齊密舌長柔軟舌色赤好梵聲深好象王聲相迦陵頻伽聲齒根圓滿鼻孔淨潔鼻不下垂鼻高修長鼻高方廣目廣清淨眼睛黑光目睫次第眉如半月眉毛黑澤眉毛光明耳皆垂埵頭髮細軟王請仙人阿私陀瞻之西方能相吉凶貴賤仙人也曰太子隨身相好粲若芬華太子身相如初開芬陀梨華嬌態香潔也在家作轉輪王出家成無上道在家定作金轉輪王出家必成無上道果以臣觀之必不得在家矣仙人所言太子定離國位遂泣曰太子成佛必施大法臣今老矣失此大利良可悲哉有淚無聲曰泣仙人知太子成佛演説大法老不得聞故乃泣之年十有九壬申二月八日周時正月建子二月八日即今十二月八日是也呼車匿鞁朱騣車匿者佛之家所生之子朱騣者馬也遊看四門逢僧了法不樂王宮亟欲修心因遊觀四門東門見老人衰朽南門見其病者西門見送葬者北門見一比丘乃是作瓶天子所化太子問言汝何等人比丘答曰世間無常我由修其聖道超於彼岸若能如是修者亦皆如之言訖騰空而去太子因見老病死苦甚為恐怖遇此比丘愈起善心厭棄王宮亟急欲要出家修行王生憂懼恐斷國嗣遂增以侍御音樂娛之太子不悅王知太子心欲出家恐懼斷絶國之後嗣遂增添侍奉婇女加以管絃音樂取其歡樂太子不以為悅樂也逮夜之央逮至也央半也至其半夜淨居天人浮居天人乃是輔太子出家者也以天福力彰侍御之魗容九孔流溢不淨蛆蟲可厭魗音醜淨居天人用天福神力彰顯侍御綏女俱各昏睡現死尸相各兩兩耳兩鼻口并大小便等九孔流出不淨蛆蟲太子轉生厭離之心也夜半子時淨居天人報曰太子可出宮今正是時天人告太子曰既降兜率欲滿宿願要出王宮今正是時於是𩣔犍陟犍陟者馬名也僕車匿車匿從人天人捧駕天人捧其馬足飛空而去飛空逾城而去投身雪嶺趺坐盤石既至雪嶺坐於盤陀石上淨思六年遂成佛果正宗記云先於彌樓山習不用處定次於鬱頭弗處習非非想處定又於象鼻山覩明星面悟道六年淨思方成佛果矣無惡不去無善不圓去上聲除也諸惡盡去萬善周圓首詣鹿林三轉四諦而摩訶男等五人得道五人者佛初入山父族三人一阿濕婆二婆提三摩訶男拘利母族二人一憍陳如二十力迦葉侍佛佛不用五人各修梵行佛既成道首於鹿苑與憍陳如等説三轉四諦法輪三轉者一示相轉二勸修轉三作證轉一示相轉者此是苦此是集此是滅此是道二勸修轉者此是苦汝須知此是集汝須斷此是滅汝須證此是道汝須修知世間苦因苦果出世間樂因樂果也三作證轉者此是苦我已知此是集我已斷此是滅我已證此是道我已修陳如等疑問如來還出世間苦因苦果樂因樂果否如來答云我已知我已斷我已修我已證五人聞説此法各證道果初宣小教三轉四諦次演空宗由是向室羅筏城祇園等處八部般若次第興焉室羅筏城即舍衛國城也祗園者即祗樹給孤獨也八部般若者大品般若中品般若放光般若光贊般若道行般若金剛般若勝天王般若文殊般若也八部般若多以破有歸空故曰空宗後居鷲嶺演妙法華會三歸一捨權從實鷲嶺名其山形似鷲鳥故曰鷲嶺嵓玲瓏可容萬人佛於此中多説妙法先因鹿苑説有而盡皆執有次演八部般若以説空而咸皆執空後於鷲嶺演妙法華會三歸一者會三乘歸於一乘捨權從實者乃從淺至深捨小而歸大也及於普光明殿菩提道場欲色諸天逝林等處圓音極唱演大華嚴此經有三部上部十三千大千微塵數偈一四天下微塵品中部四十九萬八千八百偈一千二百品下部十萬偈頌四十八品今所傳者三十九品共四萬五千頌在唐外有九品未就此下部經也此經七處談九會演具偏圓頓漸空有權實總貫三乘五教之玄理故曰大方廣佛華嚴經是也事無不窮理無不盡此經大小事窮淺深理盡聖凡交徹主伴互參圓五教貫三乘含十方攝一切會凡聖歸一體通真俗以混融故也空有齊彰如空中而現影色心俱入照境皆寂如燈遞照似鏡胥融大小相含一多無礙胥相也總結上文意佛之妙用或大或小而含容或一或多而無礙此正顯凡聖交徹主伴互參無礙者如燈燈互照鏡鏡相融者也十世同於一念故華嚴偈云一念普觀無量劫無去無來亦無住如斯了知三世事超諸方便成十力剎那現於一毫如來妙用攝大千國土藏於一毫毛端以一毫頭而現大千沙界此華嚴諸佛菩薩圓融一切境界故以不有實無之有幻有而成於有能有有所有之宗妙有以不空頑空之空真空而現於空能空空所現之境一真法界直以空有不立二諦常存真無所立妄本是空不離不即二諦常存寂照兩忘真俗並顯於是體用俱忘二諦雙顯即有而現於空有就有而觀空有即空而現於有空就空而觀有空包法界共異之名如海納於異流同名方廣似百川而同廣統諸教差別之號總攝三乘五教之名總號華嚴小始終頓之四皆不出此圓教故曰總號華嚴實圓滿之洪規實為圓滿具足之大規模故也乃真常之妙説無假為真不變為常既談真常之理故曰妙説大矣哉讚此圓教廣大不可思議之極致也法無大小前後約機而説之故也逈脫言慮心想不能及情識名言不能至故無不可思議之極至盡之教也故佛乃利生廣大故者指義之辭餘例此普度一切衆生成證一乘妙果故曰廣大也潤物洪深利齊之心若天降甘澤萬物皆蒙滋潤故曰潤物洪深是也牢籠億劫之生華嚴經云張大教網摝人天魚置涅槃岸濟拔無邊之苦隨類化導濟拔沈淪皆得離苦獲樂然以不生之生而現於有生之生如來真淨妙體本來無生因見一切衆生往來六道無有了期故以示無生之體化現於有生之類故也以無相之相而現於有相之相矣真實之相名之無相以無相之理現於有相之中乃化度衆生之相矣客澄思淨默移時不語客聞言佛圓融要妙法門清淨其心念靜默過時不語妙明曰子於吾説不自決乎子今聞我所言法要不能自決擇於理者乎客曰吾恐子以弘詞麗句而欺我也我恐子以用弘大語句美麗言辭而欺瞞我也妙明曰不然不然此説昔華嚴會上二乘聖人皆是漏盡大阿羅漢梵語阿羅漢此云無學昔者華嚴會上佛説此經之時聲聞緣覺二乘小聖諸漏已盡皆是煩惱斷盡阿羅漢具八解脫從任無礙塵類不能拘故曰解脫八者一內有色觀外有色解脫二內無色觀外色解脫三淨解脫四空無邊處解脫五識無邊處解脫六無所有處解脫七非想處解脫八想受滅處解脫也獲六神通獲得也六神通者一天眼通二天耳通三他心通四神境通五宿命通六漏盡通始聽華嚴圓滿教誨此二乘聖人初於華嚴會上聞此圓教之理訓誨者也目不覩佛身覩者見也不見佛身耳不聞佛語聞者聽也耳不聽佛語也心不了法義心不了知所説法之義味也神迷意醉如下云情惛是也智暗情惛其心神如不知東西南北迷惑真如如明眼人入於黑暗之處其情性惛而不明者也茫然自失茫茫然渺漭而自失其身命者也都無所覺知蓋此圓教唯大乘菩薩所知其二乘小聖聞此法要皆如盲如聾故曰都無所知者也後説入法界品僅能領悟僅才也然後説入法界品中僅才少有省悟也且向之壅遏而後慧解者何也以前之三十八品所被機性壅塞而不通也遏者遮也謂先壅遏而不知然後慧發解會者何謂也蓋小機不能速領大法也因前三十八品以多被大機性故二乘不能知也唯是入地大菩薩衆理微言極不近常情唯獨也唯是入十地位大菩薩乃達至極微妙言辭故不可以淺近尋常識情卜度也非二乘聖人所履境界故不可得聞也此法實不是聲聞緣覺小聖二乘所行所履之境界故不可得而聞也頗有菩薩重與喻之彼諸聖者抑而不信頗少也有菩薩重與譬喻説之彼諸聖人抑且猶有不能信者聖情猶爾況於子乎爾者語助辭二乘聖人重重譬喻説尚乃不知不信何比況於子乎客曰聖且不了子奚知乎爰者何也客反徵曰聖人尚且不知子何能知乎妙明曰以聖智言之則大凡不及於小聖聖智者二乘小聖善具神變自在無礙因耽此故於大乘而不能行也大心凡夫由無神通故不及於小聖也以根性言之則小聖不及於大凡上根上信凡夫行菩薩行修大乘道不立階級直至正覺是小聖不及大凡也由根有大小而性有厚薄上根人意氣高遠下根人意氣微劣故有大小厚薄之分吾以信道崇篤深忍欲樂故於大法能略其知也我因信此道理崇高而篤實所以深忍私欲世樂戒而不貪又於此大乘法中略少而知也如其蔓演以俟多聞若有牽引枝蔓而詳演其義以俟廣識多聞者也問佛第三此篇因第二篇中言佛既有姓名因何不稱故曰問佛客曰彼既有姓捨而不稱復稱為佛其義何也妙明曰此乃大聖人之諡號也史記諡法者行之迹也號者功之表也有大功則稱諡號凡號有十謂如來倣同先迹應供堪為福田正遍知達偽通真明行足果從因得善逝妙往菩提世間解無上士窮盡法界調御丈夫降生成道天人師應機説法佛三覺圓明世尊出世獨尊以號稱之故名曰佛猶三皇之與五帝稱號而不稱姓也三皇者伏羲神農軒轅也五帝者少昊顓頊高辛唐堯虞舜也皆有姓名而唯稱號佛者覺也梵語佛陀此云覺也其義有三自覺覺他覺行圓滿自覺者自利也覺他者利他也覺行圓滿者謂自他俱利也以三祇滿梵語祗此云劫也諸佛皆修三無量劫方得功行圓滿三界出不被欲界色界無色界所拘故曰出也三身具清淨法身圓滿報身三類化身三身既圓故曰具也三智朗生空智法空智俱空智三智既明故曰朗也三覺明自覺覺他覺行圓滿三覺洞照故曰明也三德圓般若法身解脫皆具故曰圓也三常備凝然常不斷常化身常即法報化三身三常既具故曰備也圓十善一不殺生二不倫盜三不邪淫四不兩舌五不惡口六不綺語七不妄言八不貪欲九不瞋恚十不邪見離此十惡即成十善故曰圓也滿十度布施持戒忍辱精進禪定智慧方便大願大力大智圓此十度故曰滿也超十地歡喜地離垢地發光地焰慧地難勝地現前地遠行地不動地善惠地法雲地超越十地證等妙二覺故曰超也具十身菩提身願身化身力持身相好身威勢身意生身福德身智身備此十身故曰具也備十方是處非處力知業力三昧力知根力知欲力知性力至道力宿命力天眼力無漏力十力既完故曰備也明十智一世信智二法智三類智四苦智五集智六滅智七道智八他心智九盡智十無生智十智洞然故曰明也嚴十號一如來二應供三正遍知四明行足五善逝六世間解無上士七調御丈夫八天人師九佛十世尊也威重所尊故曰嚴也方名為佛總結上文意具上如許功德方名為佛佛有三身此約報化而言以此約指報身化身而説法身則非子所聞也若言法身之理不當與子所聞聽也客曰因欲聞之客堅執固要聽聞也妙明曰切聞法身者此下形容法身之妙謂諸如來真淨法界真淨法界者即法身之理神明之本造化之根神明之本者即真淨妙明之本體也造化之根者即至聖神化之根源也此乃諸佛之境界也鎔冶兩儀爐鎚萬有此喻造化為大冶莊子以天地為大爐以造化為大冶若鎔銷而鑄之兩儀乃陰陽升降之理即一動一靜之法亦如良工鑄物必以爐鞴鉗鎚作諸器皿皆從方寸之間而發生此喻法身邊事大而無外法身之理包含天地故曰無外微而無內法身微妙比類鄰虛之塵亦無其內曠而無端曠者昭明廣大之儀法身之理然昭明廣大而無端緒可觀杳而無對杳者冥暗深寂之貌法身之妙冥暗深寂而無可等對者萬象之以所生萬象之類皆從法身所生五音之以所成樂星圖譜云五音者宮商角徵羽也而配合五行宮土也商金角木徵火羽水此五音五行亦從此理所生成生而無始真如之理本無所始成而無終妙有之體亦無所終無始無終結上兩句復引下辭既無所始亦無所終無皎無昧法身之理非明非暗無兆無眹虛靈本體無機徵萌兆之朕無名無迹無相之理故無名字及蹤迹也無縱無廣佛真法身猶若虛空豈有縱之南北廣之東西四方可比擬哉無豎無橫圓通大虛遍一切處何橫豎之拘哉無方無維真空妙有遍一切處豈於四方四維而可度乎無小無大清淨本然包含法界豈能大小之等量哉無相無性法身之妙無相可觀無性可據無滅無生真空妙理本無生滅無染無淨妙體真空豈有染淨本來寂靜元常本來如如故曰寂靜自性涅槃真常湛然不隨物化故曰自性涅槃非過去然現涅槃本無所動故曰非過去非未來聞見録邵子云身在天地後心在天地先天地自我出其餘勿足言豈有未來之理哉非現在古德云三世覓心心不有心不有處妄元無妄元無處即菩提涅槃生死本平等若是則現在亦無可處也非繫非離繫此後重明法身之妙也法身不著繫縛亦不著於不繫縛非縛非解脫既不著縛亦不著於解脫非苦非樂實際理地不受一塵何苦樂之所致哉非不苦非不樂亦不著於不苦亦不著於不樂也非色非心虛靈本覺不屬於色相亦不屬於心相也非不色非不心法身之理靜則似無動則還有然雖如是亦不著於不色不心也非理非事不是理不是事非不理非不事無不是理無不是事唯是一味心佛共衆生是三無差別喻如海納百川其味唯一而非一味亦不執著於一味矣遍一切處法身猶如虛空無處不有故曰遍一切處而非一切處而亦不著遍一切處妙體常圓真常妙體在凡不減在聖不增卓然而常圓滿也而非常圓亦不著於常圓湛若虛空法身之理澄湛猶若虛空而非處空亦不比擬頑空清淨無為清淨本然本非作為而無不為法身常寂為度生故亦若有為有情無情有情者一切含靈也無情者闡提也然闡提有情而不明真理若無情也平等共有結上句義金剛經云是法平等也以如是等無量行相用如上所言喻無量行相而非行相雖用無量行相以喻之實不著於行相也應正了知名法身佛總結上文意當如上真正了知方才名為法身佛也客曰法身之義盡在此乎法身義理盡在此言乎妙明曰抑未也抑然而未盡也夫法身者此下復明法身之妙離四句絶百非四句者有句無句亦有句亦無句非有句非無句也百非者四四相資一十六三世共有四十八已起未起九十六四種根本百法謂但著一法即非也故曰百非動念則隔動念則情生情生則智隔強言則乖強上聲強言則不合理但著言説則乖離也脫聲塵脫離耳界聲塵離文字離去語言文字而語默動靜皆不可得而親也有言曰語無言曰默體搖曰動心寂曰靜於此語默動靜之間皆不可得而親近也蓋以法身離言總結上文意大蓋法身離言語如云不著見聞覺知故也離言亦非法身也若離語言之外別求法身亦非法身如云不離見聞覺知是也子頗欲學達離不離言之道者乎汝頗少學此離與不離言之妙道者乎客曰唯唯音尾速應之辭也妙明曰欲善其事先利其器論語子貢曰工欲善其事必先利其器欲為仁而親仁賢欲學聖道必先立其所志如此則聖道易明矣子能先學離不離言之方便乎善巧易為曰方便也客曰唯命是聽速而應曰聽其命令妙明曰欲達離不離言之道者此下形容造道之妙當先觀一切法欲學此道應當觀察世間所有生滅一切等法無實無虛莫於虛實而生取著無我無彼莫生人我之見無垢無淨本性寂然元無垢淨黜聰明去智曰黜謂去世間聰明墮支體離形曰墮謂離四大支體廓塵習廓落塵寰所習屏念慮屏音秉謂屏除妄念思慮劈情卷欲劈破私情卷除嗜欲泯智凝神泯絶世智凝結心神忘懷澄思不記情懷澄清思慮如上數事去之可以近道矣然後眼如耳耳如鼻鼻如口口如耳凡學道者到此心凝形釋之時故六根總歸一源身心唯一不二既爾則色聲香味觸法六塵皆不能搖身心混融體智圓通結上文意既六根不染身心混融圓通一體直得貫疏親不知親己亦不疏物忘物我至道不可得以情求其物我之情皆不可不忘也泯榮辱安榮恥辱之情而盡泯滅絶是非是與不是盡皆絶之收視返聽收斂其目返照本源虛已冥真空虛我有冥契本真百醭出於口邊忘其語言青草生於舌上甚如死人千聖喚不回頭靈心絶待百鳥都無尋處泯相澄神形同稿木形體同枯稿之木者無生意也心若死灰心若久冷灰者再不起念也智間遠水孤峯莊子云大智間間者是從容自得之貌可謂遠水孤峯者雖有形而取之不可及也性寂寒潭皎月性體寂然若寒潭水中之月影雖動而不搖流而不去矣然後可以盡離不離言之道者也總結上文意若能如是然後可許為離不離言之道客蹶然而興曰蹶然速起之貌興者興起之辭豫心意懵懵毛孔反悶亂而性暗也莫公反心迷而不明也精神慌𢟨慌胡廣反忽也𢟨音母愚昧也於子之説莫知其所入也總結上文意悶亂而性暗心迷而不明恍惚愚昧於子之説法身妙理皆無所知所入也妙明曰夫何忽哉何恍惚之有哉始吾以子為達矣今子之鄙而至此乎始初見子為通達者今逼急而無所知者豈不鄙陋而至於此乎居吾將告汝居若坐也謂我將此理告之與汝也吾昔嘗學於魚巖老人魚巖山名老人即妙明子秉授法要師祥公是也三年之內執弟子禮三年之間以弟子之禮而侍奉也不敢以一言形是義也不敢輕用一言問此義也而魚巖亦不我之告也魚巖亦不告説與我也五年之後服勤驅役無不從適至五年後因服事殷勤驅馳役使無有不從順而隨適之者也始得魚巖引而並席徵申此道少有開覺於此方得同席而坐少申道理略有開解知覺爾後日往而問而不我吝也於後日每去問而不慳吝於我而子獨心意迫速而容易於道者乎豈惟以心逼迫急速容易而便得此道者乎客曰若義奈何若此為之奈何妙明曰止乎止乎止者禁約之辭重言止者禁之至也夫走之愈數而迹之愈多夫音扶夫者起辭之端數皆音朔謂走愈頻數則蹤迹愈多言之愈數而道之愈遠言頻數則道轉不相涉也若不處陰而息迹忘言而體道也莊子云處陰以休影處靜以息迹少言辭則道自近矣向吾所説始之以言言言向上吾之言辭則以言其説道之言也次之以言言無言次後言辭則用言無言之道也然未及以無言言無言也若此則猶未是離無言無説之言也客曰請聞無言欲聞無言之道妙明示之默良久默然以示無言之道有間有少頃間客曰此離言之道者乎只此可謂離言之道者乎妙明不應遂擊几而歌曰以手擊几而遂歌數曰修竹搖風兮窗戶冷澄潭浸月兮星斗寒瑤琴無絃兮曲朗然高山流水兮不須彈若邵子詩云月到天心處風來木面時一般清意味料得少人知自擊几主此歌正顯無言之道歌罷就枕而臥於是露盡離言之道學者於此可玩味而自消息之客離席出戶移時而來曰向之問答理甚隱密不近人情請置其説離其席出於門外過時而來曰若向所言問答之辭其理甚隱而深密不近尋常情意且止其説也敢問佛向雪山修道不云登仙還言成佛其義若何謂再敢問佛於雪山修道不言成仙猶言成佛其義何也妙明曰道者導也導人至於無為即導引之義也謂導引衆生至於無為之義也客曰無為者何也無為之理今何者是妙明曰向不云乎法身佛者即無為也言法身佛者即無形無相無作無為之妙理也然無為者下文形容無為之妙牽之無前如顏子曰忽然在後是也引之無後若瞻之在前也舉之無上若仰之彌高也抑之無下如抑按無所下迎之無首欲迎而觀之則無端緒隨之無後隨而視之則無其末後視之無形顧視不見其形聽之無聲審聽不聞其聲溷而不淈溷昏一聲淈古沒反皆濁義謂濁而不濁澄而不清澄清也謂清而不清不可以言言法身之理舉念則乖故不可以言説不可以識識識情一動障蔽真如故不可以識識鴻濛渺漭鴻者自然之元氣以喻法身濛者濛濛然者喻法身似有而無渺漭者大水貌亦喻法身渺漭而無有涯涘矣唯如如智可冥會耳唯通達如如之智者可玄知而密會契耳
