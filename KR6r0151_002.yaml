body:
  text: 金臺大慈恩寺西域師子比丘述注喻舉第四此篇因言佛經繁而不要以此取譬故曰喻舉客曰至寶光而不華至極之寶有光澤而無虛華之色至辭慤而不飾慤音却至理之言辭誠慤善而無假莊飾言約而至者麗言簡約而至極者美麗事寡而達者明事雖寡少而理通達者分明故珠玉少而貴結上文意以珠玉喻儒書故少而貴瓦礫多而賤碎瓦小石喻之佛經多而賤矣聖人製六經不過五十萬言六經者易書詩春秋禮記今見佛經卷以萬計言以億數自非一人力所堪能蓋繁而不要也言佛經萬卷之廣億數之多不是一人用力可觀覽者蓋繁冗而不簡要也妙明曰孟子云江海異於行潦深廣也行潦者雨水聚於道路無源水也江海之水至深至廣比行潦而殊異也泰山別於丘陵者高大也丘者土之聚也陵者大阜乃高土阜也泰山東嶽也至高至大比於丘陵故有差別若大深不異於行潦則孺子浴其淵孺子説文乳子也若江之遠深海之廣闊而不異於行潦則食乳之子亦可洗濯高不出於丘陵則跛羊陵其巔上一陵字丘陵也下一陵字侮也意謂泰山之高大而不過於丘陵跛羊亦侮戲於巔頂摩天之翼不居藿葦之莖藿胡官反摩天之翼莊子逍遙篇北溟有魚其名為鯤化而為鳥其名為鵬怒而飛其翼若垂天之雲閃翅則水擊三千里搏扶搖而上者九萬里藿葦細葦也若大鵬摩天之翼豈於細葦之上而居之哉吞舟之魚不處溪塘之水莊子鯤魚大不知幾千里也何難吞舟也豈隱處於淺溪小塘剖蚌蛤之腹求明月之珠明月珠者夜明珠也唯驪龍頷下有之照夜如晝若剖破蚌蛤之肚腹求取明月之珠未之有也探枳棘之巢求鸞鳳之卵橘逾淮北而為枳棘者棘針也如枳棘上之鳥巢欲探取鸞鳳之卵不亦難乎必難獲者何也此結上引下之語蓋小不容於大而大不處乎小也故萬斛之鼎不可滿以盂水盛五斗曰斛鼎者兩耳三足言盛萬斛之鼎豈可一鉢盂之水而能滿之一鈞之鍾不可容於流泉三十斤為一鈞如三十斤鍾欲容納於長流之水者無是可也合抱之木豈適用以茆茨二人相圍曰合抱茆茨茆草也適相從之義謂合抱之大木豈適於茆茨而用之尋尺之棘安能負於廣廈六尺曰尋棘荊棘也廣廈大屋也言六尺之棘安能負荷廣大故器有寬隘器器皿也結上文斛鼎鍾盂也量有巨細亦結上文斛鼎鍾盂各有大小之量也材有勝劣亦結上文合抱之木於茅茨尋尺之棘及廣廈故各有勝大劣小而不同也物有輕重總結上文意物之重者鼎木廈也物之輕者鍾盂茨棘也德有厚薄已上數事喻聖之德也厚喻大乘薄喻小乘道有淺深大聖之道故深小聖之道故淺法有權實權為暫設實為真準機有小大權實之教各有大小之機所處之分未有乖也乖差於理也復結上文意意寬隘勝劣輕重厚薄淺深權實大小等量各處之分而不可乖違也且佛之經也先以譬喻然後形容經之大義前説億劫之事如經云過去千萬億劫之事也後道萬世之要道言也後言萬世之要妙至於五始未萌之前列子天瑞篇曰原天地未判之初有太易太初太始太素太極謂天地未分之前五始混沌而未發萌時也二儀肇形之際肇始也易曰太極生兩儀謂始分之際其遠不可推佛之所言久遠劫數不可推窮也其事不可紀空劫已前之事迹亦不可以紀記也其微不可握老子云摶之不得曰微故曰不可握也其纖不可入其纖細微妙不可窮入也佛悉彌綸於廣大之外悉盡也彌遍也綸理也結上文五始二儀不可推不可紀不可記不可握不可入其數事唯佛盡遍理於天地之外剖析其窈渺之內剖析者分破也唯佛能剖破分析於窈渺幽微之內以至高天無極之上上至非非想天厚地無極之下下至金輪水際莫不示諸斯乎如指其掌也示垂也諸於也斯此也總結上文意佛之妙用廣大之外窈渺之內高天之上厚地之下凡有事理無不盡知故謂垂示於此理如指其手掌中之物也所明既博文奚為繁結前萬計億數之言佛既明廣大無窮之事其經文又何為繁也哉卷萬言億亦未足為多重標客言卷萬億言亦未足為多也何不要之有耶如上所明之事何謂不簡要之有也耶豈特以一人力所堪能然後以為得矣焉用一人之力堪可能為然後稱為簡要所得者矣譬如渴人飲海飽而自足焉知其餘哉復結上文意卷萬億數之義譬如極渴之人飲大海之水飽足則止焉知其餘廣大宗師第五此篇言古今帝主賢士皆所宗師之故曰宗師客曰子之行説佛道崇虛至尊至大二帝三王曷不修之既為佛之崇高清虛至尊貴而廣大二帝堯舜也三王夏商周也何不修佛之道孔子老聃何不傳之夫子老子何不傳佛之道六經不載其辭儒教書中不見載佛之言辭諸子不書其説儒門諸子等籍亦不見書經所説且先賢古哲未聞行其道者而子獨好於異耶結上文古之聖哲先賢等經諸子等書皆無所宗佛者唯子獨好異端之教也耶妙明曰子執之固也子偏執之固蔽者也書不必孔丘之言合義者從丘孔子名然孔聖之書理微言極有所未達者亦不可定用但以合義者亦皆從順者也藥不必扁鵲之方愈病者良名醫傳扁鵲古之善醫者曾療虢太子返魂亦不必定用但能痊愈其病者亦良善也萬善殊途而同歸然萬善為者不同一路其善則一也百慮一致而為善百般思慮至唯為一善也為善不同同歸于治尚書云為善故不一端而無不可之善洎有所成則同名歸於善治也君子集衆善而輔其身君子者成德之士也凡君子之所作為惟集積衆善而以輔助於其身也而以何常師有耶論語公孫朝即衛大夫問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有昔者虞舜師務成唐堯師尹壽豫按老子列仙傳化規實迹帝堯之時為務成帝舜之時為尹壽漢文禮河上漢文帝禮河上公而求道德二篇也黃帝拜廣成黃帝於崆洞山拜求治身之道於廣成子武丁納誨傅巖傅巖即傅説也武丁即商高宗尚書説命篇曰朝夕納誨以輔台德也説音悅太甲投誠伊尹尚書太甲乃湯孫至昏者也湯三聘伊尹為相後以阿衡之任放逐太甲於桐宮帝悔過修德既成後立號太宗也文王尊呂望史記文王為西伯時一日夢飛熊之兆卜之於渭水之陽將大德焉天與汝師以之佐昌齋三日渭水果得呂望勞而問之乃載以歸立為太公望仲尼學老聃家語適周篇問禮於老聃訪樂於萇弘孔子將行與南宮敬叔曰吾師老聃博古知今者也豈但見載於六經然後以從其學也此標客言以結上文意如上諸聖皆有其師豈直待載於六經然後從而為學也佛既生周昭王時法化未來此土暨漢明帝永平十年聲教漸始流入中區史記後漢明帝永平三年四月八日夜夢金人長丈六放大光明次日問群臣丞相韓憲奏曰此西方聖人也周朝備云千年之後教來此土帝悅遣蔡愔等一十八人齎敕西國尋訪聖典至流沙遇摩騰竺法蘭白馬馱經箱永平十年十月到於洛陽帝大悅重賞譯經於時方流入中國且二帝三王時殊代異隔而不修二帝三王與佛時世不同遠隔邦域故不修佛道也仲尼伯陽審無受器知而不傳仲尼夫子也伯陽老子也孔老二聖審無受道之器而無可傳者故知而不傳也諸子未達豈敢言也周秦之時佛法未來諸子豈敢妄傳夫如是奚二帝三王孔子老聃傳習記載之有耶結上文意厥後白馬經來厥者其也亦烏僧至三國志吳王赤烏四年康居國沙門僧會至顯大神異王禮事之蘭騰道揚於明帝三寶録云漢明帝摩騰竺法蘭永平十四年五嶽道士楮善信等上表滅佛帝命二教於白馬寺以二教經置於二臺同時舉火道教皆毀唯佛典獨存於時君臣愕然愈加崇奉僧會德被於孫權三國志孫權吳王也時康僧既至廣陳如來之玄妙王求舍利立壇祈三七乃至王試真偽火焚砧鎚俱無所損王遂建浮圖隋文稽顙曇延稽遲也顙額也隋史高僧傳曇延去師中條山西宮寺僧隋文帝同輦輿帝以師禮之拜封為國師梁武投誠寶志梁史僧寶志即志公也梁武帝投禮為師李唐傾心玄奘慈恩傳唐太宗真觀年間法師西天求教回親迎於儀鳳殿對言西域勝境奉詔於洪福寺譯經帝及公卿國戚皆傾心禮也姚秦拜首羅什釋氏通鑑姚秦即姚興也都長安因討龜慈得羅什於終南山賜立逍遙園翻譯衆經乃以香華敬禮待之合國王臣事禮也苻堅禮敬道安五代史僧寶傳苻堅剋襄陽得道安法師同輦載歸為師禮之恩渥甚厚齊主師崇上統齊史僧寶傳云齊世祖武成帝大寧三年受上統法師朝中大臣無不敬禮創報德寺請師居之裴相了心於黃蘗傳燈裴相諱休字公美京兆人出刺使瑞州詣高安寺因問黃蘗壁間畫者何也蘗曰高僧真儀休曰真儀可觀高僧何在蘗高聲云裴公公諾曰在甚麼處休即有悟昌黎求法於大顛釋氏通鑑云昌黎即韓愈字退之官拜為刑部侍郎唐憲宗于鳳翔府護國寺即今法門寺迎佛骨於內宮供養愈上表謗佛帝欲誅之裴度等諫貶於潮州聞大顛親詣求法云弟子軍州事繁省要處乞師指示良久愈罔措侍者三平敲禪床一下師云作麼平云先以定動然後智拔愈云師門風高峻於侍者處得箇入路李翱道問藥山傳燈云李翱字習之唐賢臣出守豐州聞藥山惟儼禪師道風一日謁見師不顧公曰見面不如聞名便退師云尚書何得貴耳而賤目公遂拜而問曰如何是道山以手指淨瓶曰會麼公曰不會山曰雲在青天水在瓶公於言下有省山谷禪參佛印傳燈黃庭堅字魯直號山谷道人宋哲宗元祐間丁憂在家嘗詣黃龍山晦堂禪師處一日舉孔子謂弟子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也於是請公詮什晦堂不然其説公怒愀然時當暑退問公聞木稚華香乎公曰聞晦曰吾無隱乎爾公頓然領悟晉主虔恭慧遠晉史釋鑑晉孝武帝大元年間聞遠公法師道風帝幸于山修東林寺以師禮之宋文致敬求那釋鑑五代時宋文帝元嘉年間帝見求那般摩法師云弟子常欲齋戒不遂望師教之師曰帝王與匹夫修之名異匹夫身賤名劣帝王乃四海為家與萬民為王不殺之德亦為重矣帝曰師言真為開悟人心明達物理帝深敬仰蕭衍詣寺捨身史記衍即梁武帝名三入金田捨身群臣以百萬金珠贖帝歸朝丹霞回途選佛傳燈丹霞唐文宗時人因儒長安應舉遇僧曰選官何如選佛霞詣江西馬祖既至云緣在石頭既至命執爨後三年披剃大了祖意矣此言丹霞為儒終歸釋門後果成道矣而子復云未聞行其道者何蔽也哉蔽障也自堯舜至漢唐宋以來聖君賢臣高士明儒行此道者略舉以曉之子何不聞而自障蔽也自古賢哲莫不匿迹佛書棲心祖道豈豫獨好於異乎自古至今賢能聖哲無不匿蹤迹於佛之經書潛栖心意於祖道豈今我之獨好異端者乎通相第六此篇通明佛之妙相故曰通相客曰子言佛具三十二相八十種好何異人之甚耶客擬第二篇中之事故重徵疑殆富子之説非實之然乎殆將也客曰子將豐富汝教之言以答者不是誠實之然者乎妙明曰不然不然其説昔者伏羲蛇身伏羲外傳曰伏羲生而蛇身有鱗甲神農牛首神農外傳曰神農頭生兩角如牛堯眉八彩堯外傳曰準南子曰堯眉有八般彩色舜目重瞳舜外傳曰準南子云舜兩眼有重瞳文王四乳文王外傳曰周文王胸生四乳周公背僂周公外傳曰周公背隆起者腰病也臯陶馬喙皋陶外傳曰陶音姚喙許穢切舜賢臣也口似馬喙夏禹虎鼻夏禹外傳曰夏禹鼻如虎而仲尼天賦淑德孔子外傳曰仲尼孔子字乃天命淑善之賢全德者聖德也其眉如堯其目如舜其背如禹老子宿蘊異質生而皓首老子外傳曰老子宿世蘊積怪異形質生而白髮老而童顏白髮以老童子顏容耳漫而大聃而無輪耳漫長大而無輪廓諡曰聃此皆異人之狀何獨異佛之問耶如上所引歷代聖賢皆有異常之相狀何獨疑佛之異相為問也耶是以聖人具非常之狀而有非常之德觀夫聖賢具非常人之相狀亦有非常人之德行也豈直與天下匹夫匹婦之為類也豈特與普天之下一匹之愚夫一匹之愚婦常流俗輩同類而為例也而子所問可謂局矣如子之所問可為偏執局量者矣論孝第七此篇全言為孝故曰論孝客曰孝經以四事不毀為德之本四事者身體髮膚也人之一身四體毛髮及其皮膚皆是父母所生不敢毀傷者言人之行莫大於孝故曰為德之本也論語以三事無違為孝之先孟懿子問孝子曰無違孟懿子魯大夫問孝於夫子子曰無違謂不背於理也樊遲夫子弟子御其車夫子恐懿子未達故謂樊遲以發之樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮故生事葬祀乃事親始終具矣是以為孝之先也故曾子有疾召門弟子曰啓豫足啓豫手故者指義之辭啓開也曾子疾之臨終使弟子開其衾被而視之手足以其受身體於父母不敢毀傷故使弟子開衾而視之曰父母全而生之子當全而歸之可謂孝矣今之沙門梵語沙門此云勤息剃除鬚髮不守全軀何違聖之不孝耶妙明曰不然不然此理也昔者泰伯被髮文身可謂毀傷矣而仲尼稱其至德泰伯周太王之長子讓不嗣位剪髮文身之於吳其弟仲雍論語曰泰伯其可謂至德也已矣三以天下讓民無德而稱焉其剪髮文身孔子何不責其不孝以稱其至德豫讓漆身史記豫讓晉人先事范中行氏後事智伯趙襄子殺智伯讓欲報讐漆身為癩吞炭為啞五殺不中後仗劍而死荊軻義死刺客傳荊軻齊人之燕燕太子丹使軻入秦為刺客不中遂死於秦介子焚軀晉文公既即位子推無爵遂亡去之綿山文公召不出以火烈山林擬逼而出子推守節伏火而死夷齊自餓毀之至也而六經子史未聞譏其不孝以泰伯豫讓荊軻子推夷齊等皆自毀其身而目觀六經子史未聞見責其不孝反以至德而稱者何也孝之言順也從順父母之正令為言孝順也善事父母之為孝惟善能事奉父母之為孝也元氣混沌孝在其中天地未判混沌乃一元氣未分之前孝道之理已在其中塞乎天地橫乎四海既分天地之後其孝塞乎於天地之間縱橫於四海之內罔不至夫醇醇之孝罔無也醇醇厚也人生天地間無有不至於醇醇醲厚之孝也萌乎無始故孝道發萌於無始之際親親之道涉乎有為上一親字是尊愛之義下一親字指父母言故尊親之道而涉乎於有作為也古者包犧氏之時以無為之道化利天下史記包犧氏即伏犧也謂上古三皇之時用無為無作化道於天下也而民質朴上古之人質朴敦厚不知有出告反面之道冬溫夏凊之儀告音孤申上文禮記云出必告注以知去處也反必面注回家見於親不敢使親之有望也冬則令暖父母之枕席夏則扇清枕席之以涼上古之時皆無此儀豈能全三事之無違四體之不毀者乎結上文泰伯豫讓荊軻子推夷齊等皆載史書以賢聖之德而稱何曾由守三事四體之稱贊也耶而先聖後聖無處言時民之弗孝也復結上文意先聖後聖指上古中古而言謂六經諸史並不見定言時民之不孝也子曰夫孝德之本也德者福慧仁慈之謂也德者得也謂得乎善美正大純一之稱福者安享顯榮百順之義慧者性通理解曉達之謂仁者心之德愛之理慈者柔善寬容於物又云孝弟也者其為仁之本歟論語有子所言善事父母之謂孝善事兄長之謂弟為仁者猶言行仁也歟仁者愛人利物之稱又仁者忍也好生惡殺善惡含忍謂之曰仁中庸仁者人也孟子曰仁者人心也又好生惡殺之謂仁好生者好愛於其生物也惡殺者嫌惡也見殺則不忍於其殺物也含忍為仁者蓋仁心積久而廣大一切善惡則不能動其心是謂含忍也此深明為仁之理也如數罟不入於污池斧斤以時入山林孟子數音促𮊁音古污污音烏數密也𮊁網也古者網𮊁必用四寸之目魚不滿尺市不得鬻草木零落然後斧斤方許入山林非其時伐一木非孝也非其時殺一獸非孝也禮記曾子曰樹木似時伐禽獸以持殺夫子曰斷音短斷一木殺一獸不以時非孝也故君子廣仁愛之心於草木禽獸尚不忍害何況於人乎是以君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉孟子曰齊宣王釁鐘以羊易牛二者得其兩全無害以為仁之稱也聲謂將死而哀鳴也蓋人於禽獸同生而異類故用之以禮而不忍之心不可施於見聞至於孔釣不綱論語綱網之大繩屬音獨綱絶流而魚者是也孔子少貧賤為養生與祭或不得已而釣也殷湯改祝史記商湯出野見張網四面祝曰自天下四方皆入吾網湯曰嘻注嘻歎辭盡之矣去其三面諸侯聞之曰湯德至矣及其禽獸也雖皆形於含忍而猶未及大慈普覆於生靈也謂孔子釣而不綱殷湯改祝孟子見生聞聲皆有含忍尚猶未及吾佛之大慈普覆護一切生靈也而我竺乾大聖人乾天也西天有東西南北中五天竺大聖人者佛也其仁慈含忍特越常倫特異也越過也佛之仁慈含忍超越尋常倫類以四方六合之中東西南北曰四方兼之上下曰六合八紘九圍之內八紘淮南子曰九州之外有八夤夤即緣連也八夤之外有八紘八紘者四方四維也文選注云紘者綱也紀也為天下方位之綱紀東方之紘曰桑野東南之紘曰衆安南方之紘曰反聲西南方之紘曰火土西方之紘曰夭野西北方之紘曰沙所北方之紘曰委羽東北方之紘曰方土九闈者乃禹分九州即冀兗青徐揚荊豫梁雍也飛空走陸飛空者飛鳥也走陸者走獸也具識含情六道四生之中皆有情識鱗甲羽毛鱗甲龍魚及蛇類也羽者禽鳥也毛者走獸之類也血器之品無論大小有情識者皆屬血氣品類悉以等慈戒而不殺結上文一切有情盡皆等慈戒而不殺故梵網經云一切男子是我父一切女人是我母佛觀一切男女即作父母之想我生生無不從之受生佛意生生世世皆從父母所生故觀一切男女如父母是也故六道衆生皆是父母六道者天人阿修羅地獄餓鬼傍生凡六道中男女等恐有先世之父母皆作父母之想也而殺而食者即殺我父母亦殺我故身即殺我父母者謂殺多劫已來所生我之父母或有宿報而墮於此類若今殺而食之者恐然也亦殺我故身者或殺我前生曾墮此類今若殺者亦如殺我故身也出家人戒律有明文不殺生草而況於有情乎律中云昔有比丘被賊劫奪衣物悉盡賊知佛子愛護生草守戒不殺恐後逐將比丘繫於草上其僧竟日不敢動移後遇其人釋而去之生草尚爾何況於有情者乎以是論之則麁細之行顯然麁行者孟子等言也細行者如來之行也而權實之道彰也權實之意注見在前夫孝子之養老也樂其心不違其志樂其耳目禮記內訓曾子曰養親以養志為先樂其心謂順適其心故樂而無憂也志則心之發動有所欲矣故又當先以意誠使無違逆也怡聲以問所以樂其耳也柔色以溫所以樂其目也安其寢處禮記昏定所以安其寢也晨省所以安其處也以其飲食忠養之孝子之終身禮記謂孝子終身之終終身也者非終父母之身終其身也禮記謂自終其身也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而況於人乎禮記父母所當愛之犬馬猶不敢輕賤之況父母所愛之人乎公明儀曾子弟子問於曾子曰夫子即稱曾子可謂孝矣曾子曰是何言歟是何言歟曾子聞公明儀所言夫子可以為孝乎故曾子未敢承當為孝之道夫先意承志先音線先之意行在父母意前承謂承順父母之志也示父母於道可謂孝矣以聖人之道指示父母行之則可謂孝矣參直養者也焉得為孝乎參曾子名曾子自稱其名參直養事者夫孝者尊親嚴父配天也焉敢稱於孝乎而我沙門示父母以福善垂示父母以福善乃成德之所基使行之而不輟不輟謂行而不止者也漸除生死永息輪回漸除去生死之因永息輪回之苦絶恩愛河竭煩惱海漸除攀緣恩愛之河枯竭無明煩惱之海脫形軀於假聚得果報之真實脫離幻化身形體軀虛假血氣之聚得其無上善果真淨實際之位豈小補哉如上脫離假聚了達真實焉豈稱為小補哉且父母有非行而子能爭之使不陷於不義猶得為孝孝經云父母有爭子則身不陷於不義正謂此也而猶得稱為孝焉奚況脫離於惡道獲證於善果而已矣結上文意使父母不陷於不義猶稱為孝也又何況化父母為善脫離於惡道得證善果而已今我沙門剃髮剪鬚絶名棄利剃除鬚髮者謂捨世間之形而絶虛名絶薄利也遠榮辱去浮華有榮必有辱故遠於榮辱去除世間虛偽之浮華也道慕無為心遊物外修慕無作無為自然之道心優遊於萬物之表也方焚身自害者亦以遠矣方比也若沙門剃除鬚髮而為不孝若比之介子推豫讓荊軻泰伯夷齊等焚身自害者遠之遠矣子張曰士見危致命論語子張所謂七者見危致命者能於當死而必死言義死者忘身取義者也不愛其身既忘身取義者故不愛戀其身是以君子之道事不必果唯義所在唯獨取義之所在也苟拘小道而棄大德則賢者之所不為也昔商王受尚書受紂王名諡法殘義損善曰紂無道凶殘暴慢酷虐大學曰為人君止於仁由不行乎仁政曰無道也暴惡傷害曰凶殘猛驟傲怠曰暴慢苛法濫刑曰酷虐刳剔孕婦刳音枯剖比干妻以視其胎焚炙忠良不擇賢士忠良以火焚而炭炙行炮烙之刑銅柱以膏塗之下加炭火使有臯者緣而紂與妲姬以為大樂是謂炮烙之刑斫朝涉之脛斫音斫冬月晨朝觀涉過水者怯寒者謂脛骨髓不滿斫折而看驗也酒盈池肉盈林以酒為也懸肉為林男女裸形相逐於其間內荒其色宮中立九市寵妲姬荒亂淫色為長夜之飲百姓怨望諸侯有叛者也外廢其政廢壞也政正也以正理立典常法則曰正也由內荒色欲而外廢瓌其國政也極人間之富貴極盡人間富貴欲樂者也恣身外之驕奢恣縱身外越分驕怠之奢侈微子佯狂而去之微子紂庶兄也因紂無道數諫不從則佯莊顛狂而去之箕子為之奴箕子紂之伯父殷帝乙之子諫而不聽被髮作狂而為奴臣叔比干竭忠而諫遂剖腹而死比干紂叔父也以直言諫紂紂曰吾聞聖人心有七竅乃剖腹觀心而死此亦不守全軀何不孝之可責耶若比干等被髮剖腹亦為不守全軀者何不誚責不孝也耶而孔子稱之以仁夫子皆稱之仁人也豈直以全一身之鬚髮然後稱之為孝者乎結上文意豈直用全一身鬚髮而後稱許為孝者乎是以聖人因事而立制理無常守自古聖人因其事而設立制度其理雖設而固無常守者也子曰君子不器論語成德之士不著於器量也言器者各周其用如車不可為船舟不可為車也至於君子無所不施成德之士體無不具用無不周特非一材一藝而已君子所以不器者無不施為也語云致遠恐泥論語子夏謂泥者不通也大道愈遠而通小道致遠而塞泥也此聖人之所病也病患也因此聖人憂患泥事不通也猶孟孫等四人問孝詞同而答異論語孟懿子問孝子曰無違孟武伯問孝子曰父母惟其疾之憂子遊問孝子曰今之孝者是為能養至於犬馬皆能有養不敬何以別乎子憂問孝子曰色難有事弟子服其勞有酒食先生饌曾是以為孝乎此謂問孝之言詞皆同天子所答而有別異也蓋以隨其器而授其道也論語孟懿子即告衆人者語孟武伯者以其人多可憂之事語子遊能養而或失於敬語子夏能直義而或少溫潤之色各因其材器之高下於其所失而告之有不同由是隨其器而授之其道也又奚得以體而可局哉三教聖人各立門風其當行不同由是之道隨人根器而授之又何得用一體而可局量也哉是以智士仁人不封著於名句也智慧達士德行仁人不定封執著於名相語句以偏枯局量為例也若子之問誠為近矣若子之所問誠實為淺近而矣拒毀第八此篇因有所疑以抵拒之故曰拒毀客曰延福莫過於繼嗣不孝莫過於無後莫無也欲延長於福者無能超過繼續於後嗣欲莫不稱為不孝者無過不絶於後嗣也美玩莫過於珠玉麗飾莫過於幣帛嘉美玩好者莫過於珍珠金玉美麗莊飾者莫過於幣段絹帛引喻之辭孔子曰父母生之續莫大焉父母生子傳體相續人倫之道莫大於此人倫之道續後為大今見沙門棄妻子捐貨財棄捐貨殖家財何違福孝之行遠資身之道耶因何違逆福祐孝順之善行遠離資助其身之大道耶妙明曰子言過矣夫妻子者身之餘妻子為身外之餘貨財者道之餘貨財為道外之餘也是以愛念情欲身之害也妻子貨財偏愛妄念動情牽欲無益有損故為一身之患害也澄鑑清淨道之妙也澄鑑者明鏡也言心若清淨之明鏡實為至道之玄妙也且前有金玉後有兕虎人心捨而走不敢取之何也以其先命而後利也兕音寺似牛一角身重千斤以虎為食乃傷人之惡獸也且喻前面雖有金銀珠玉其後或有兕虎故人必定棄拾而走不敢取前面金玉者何為然也蓋先愛性命然後可以樂財利也老子云身與貨孰多欲厚其身必薄其利得與失孰病欲去其病先忘其得是故甚愛必大廢愛之愈甚廢之愈大多藏必厚亡既藏所多必有厚亡之患知足不辱知止不殆殆危也可行可止則不危其身故曰知足不辱漢疏廣曰賢而多財則損其志愚而多財則益其過故曰知止不殆可以長久達此數句之義可以保身命之長久又曰罪莫大於可欲可許可也欲貪欲也欲心既萌何時而足唯得為務若也許欲者其罪更無大於此禍莫大於不知足貪不義之財而無厭足者禍患無過於此咎莫大於欲得咎殃咎也子曰戒之在得得貪欲也貪欲不止殃咎必生故知足之足常足矣又曰金玉滿堂莫之能守金玉滿堂非貪愛而能得古德云貪財莫若不貪財只為貪財天降災貪得財來人不在何如人在不貪財富貴而驕自遺其咎驕矜肆也咎殃也凡居富貴之位不守其分而馳騁富貴驕傲者乃自遺棄其位而反招殃咎也子獨不聞乎且性命之於人重於泰山天地之間萬物之類最貴重者人之性命也故以泰山喻之也妻財之於人輕於秋毫毫毛也唯秋毫極微極細妻財非不貴也有我則當用我既已亡其妻財非我所有故喻秋毫之輕也其澄鑑清淨愛念情欲亦以類矣結上文意以其澄鑑清淨則愛念情欲亦以同一類矣是以聖人急其所大而緩其所小先其所重而後其所輕急其所大者澄鑑清淨也緩其所小者愛念情欲也先其所重者性命也故重其性命若泰山後其所輕者妻財也故輕其妻財若秋毫是也誰有智者能損其所厚之生而趣其所薄之利乎趣向也言誰既為有智之士豈能損其所厚之生命而反趣向於其所薄之微利者乎孟子所謂好貨財私妻子者不孝也而我沙門棄妻捐財於是道也可謂符合矣奚反以不孝而見責也夫學佛者了世道之浮脆明時事之臧否臧善也否惡也虛偽不實謂之脆謂學佛者先了世道不實不堅之事然後而明察乎當時事務善惡之理也崇德履道誠信崇德履踐聖道去慝立身去上聲除也慝惡也若去除惡而後可立身也止暴慢以慈柔禁止凶暴傲慢用行慈善柔和制凶強以忍順制服凶惡剛強而行柔忍和順莫不使人御善慶以達無為莫無也御進也結上文數句若依此而行之則無非使人進善夢而通達無為自然之道也憑福孝以超有漏憑依託也超越也漏滲漏也重舉上文意所行則依之以福德託之以孝道必能超越至無滲漏之果位也近光祖禰近則光顯於祖宗先禰遠歷菩提歷近造也造猶到也遠則造近於菩提其福孝之大無逾此也逾越也凡為福孝之大端無能逾越光顯祖禰造歷菩提之為極致者也夫何惑哉如上所言夫何惑也哉在昔夷齊不嗣巢許無後夷齊餓死於首陽巢許隱迹於箕岫皆無後嗣也而仲尼稱其賢論語子貢曰伯夷叔齊何人也子曰古之賢人也未聞譏其非孝也今之沙門拋塵俗之纏縛尚物外之清虛今之僧人拋棄塵世冤債之纏縛高尚於萬物之外務清虛無為之道趣不往不來之方趣平聲入也趣入不去不來真淨之大方求無滅無生之理以求無死無生之妙理方之夷齊巢許之道亦以遠矣總結上文意若沙門所行之道比方於夷齊許由之道亦無高遠矣夫如是豈違福孝之行也哉夫如此所行之道豈違背於福孝也哉
