body:
  text: 金臺大慈恩寺西域師子比丘述注言符第十九此篇吻合三教之理故曰言符客曰夫孔佛二教其殊合之道或得其梗概矣梗概者大略也儒佛二教其殊別合同之道或得其大略矣未審老氏之言與夫儒佛之語敢問亦有同乎妙明曰有但時有淳澆機有大小隨其所適漢書曰澆淳散朴各隨所適教有淺深雖不能全同而亦有可同之語也孔子云中人以上可以語上也中人以下不可以語上也語去聲論語語告也言教人者當隨其高下而教則其言易入而無躐等之蔽也老子云上士聞道勤而行之中士聞道若存若亡下士聞道大笑之上士唯智非愚勤行於道中士聞其道則可上可下矣下士唯愚非智返笑聖道故上士悟中士疑下士迷佛云大根大莖大枝大葉中根中莖中枝中葉小根小莖小枝小葉法華經云上中下三品者即三乘也達摩九年不語祖師航海而來少林面壁九年顏回終日如愚孔子曰吾與回言終日不違如愚老子曰多言數窮不如守中頻數也道不屬言言多數而氣窮不如守一中之道季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊且上若不貪欲則雖賞民使之為盜民以知恥而不偷盜也老子曰不貴難得之貨使民不為盜佛云不得畜金銀生像尚書云汝惟不伐天下莫與汝爭功伐誇也若不誇有功則天下人無與爾爭奪其功也汝惟不矜天下莫與汝爭能太上曰自見者不明自是者不彰自伐者無功自矜者不長自專所見者必不明其道也自言是者其道德必不顯彰也自誇伐者必無其功也目矜才能者必不得久長也佛經云不得故自讚毀他即其類也經言不得讚誇自己毀謗他人如此者衆如此相同之言衆多也是以聖人雖居異域被機同處如出一口三教聖人雖時代國土不同其被化機緣相同之處如出一人之口但病有淺深藥有殊品而療苦求安其情一也結上文意然三教所設各有淺深不同但苦病也三聖之言藥也雖有差殊品類不同其治療病苦而欲求其安樂則一理也獨以戰國縱橫時無大器故二聖不言世外之典耳惟以三綱五常修齊治平之道而化利天下其出世玄妙之典故不言耳會名第二十此篇會同三教聖人之名目故曰會名客曰三聖設教異同之理則聞命矣敢問聖人原始返終之道可得聞乎原其始而知所生返其終而知所死如此道理可許得聞乎妙明曰甚哉子之問也此贊客之所問豫隨堂粥飯之流謙云我乃隨衆堂中食粥飯之常流焉能達聖人起盡之事也歟然以所知敢告吾子佛昔居覩史多天梵語覩史多亦名兜率陀天此云知足故名護明菩薩佛彼時號護明菩薩亦名勝善天子降神迦維羅國淨飯王宮以周昭王甲寅二十四年四月初八日於毗婆尼藍園波羅叉樹下於母摩耶右脅而生十九踰城出家成佛德相妙好住世七十九年談經三百五十度佛自降生至於雙林入滅共七十九載自成道已四十九年演教三百餘會以周穆王壬申五十二年二月十五日入般涅槃其道本乎明析色心析分也佛說三乘教法其道本欲分明色心二法即真俗二諦也指陳因果排列行位指點陳說先因後果隨其所終而證排列五十二行位階級透脫生死越四暴流河透過解脫生死之事超越四暴急流河者謂欲流有流見流無明流也超三界彼岸超出欲界色界無色界梵語波羅此云彼岸捨凡從聖得大菩提梵語菩提此云覺也捨離凡夫而證菩提之大覺也末後拈華示衆教外別傳不立文字直指人心本來是佛以正法眼藏涅槃妙心傳付飲光梵語迦葉此云飲光達摩東遷特明此事梵語菩提達摩此云覺法西天自迦葉為初祖相傳至達摩乃二十八祖東遷震旦明原始返終之道其來也月現江心祖師來東土所傳心印如月現於江心其逝也日沈山頂其歸逝也如日沈西山之頂道高堯舜德邁羲軒如子貢曰夫子賢於堯舜分身混沌之前流教太虛之始佛祖及一切衆生本有底太極混沌無極之前早有這箇道理是以流教於太虛之初始也不生不滅虛靈本體本來不生不滅出九層圓蓋之天易數九者老陽至盡之處道出於九天之上無去無來本體如如豈有去來超八維方質之地超出乎四方四隅形質之地大矣廣矣汪哉洋哉巍巍乎不可思議者也此讚佛祖道妙若汪洋大海又如五嶽巍巍不可思議也大權菩薩經云老子是迦葉菩薩化遊震旦興正録云周定王丙辰二年二月十五日老子降神於亳亳音朴老子生於楚國陳郡苦縣賴鄉仁里母懷八十一年誕於李樹下遂指為姓老氏父姓韓名乾字元卑母曰精敷孕經八十一年生李樹下因以為姓名耳字伯陽身長四尺六寸額凸眉麁反脣折鼻臀尖胯闊聃耳髼頭故曰老聃生而皓首生而白頭為周柱下史柱下史者周時掌禮之官周道既衰戰國縱橫周轍既衰淳風墜地王道不興於時去國矣牛駕而行擬遊西竺過函谷關為關令尹喜說道德二篇西涉流沙薨於槐里流沙地名函谷關即今潼闕槐里亦地名其道本乎專氣致柔抱一守真實腹虛心老子之道專守精氣使不散亂則形體應之而能順也故能致其柔和抱一守真者謂其無為自然之道一者為言至也言更無其二故抱一氣而固守本真也道德經云實其腹者懷道抱一而守其真神也虛其心者謂除其嗜欲去其煩惱也少思寡欲無私蔽而少貪欲也視之不足見道德經云視之不見名曰夷夷者無色之謂其道故無色可見聽之不能聞經云聽之不聞名曰希希者無聲之謂其道故無聲可聞寂兮寥兮寂者無音與聲也寥者無形而空也如詩上天之載無聲無臭至矣獨立而不改獨立者道更無其二也不改者常化有常也周行而不殆既明此無形無影之道則周行天下而無危殆也然後設無為之化明乎專氣抱一之道然後可以稱無為之教化行不言之教既明道妙則可以行無言無說之教足以還年却老可以證返老還童之理羽駕長生乘鸞跨鶴謂之羽駕其本體不滅謂之長生久視之道也共陰陽以晦明陰陽者指日月與陰陽而同暗同明也與天地而遐久非含和蘊素忘懷守雌者不足與語此道也若不是含養中和蘊積純真忘其情欲守一若雌之抱卵孳孳而為道者不足以論此道德也牟子云清淨法行經云震旦國人難化先以三聖而往教焉文出破邪論在藏經既字函上卷大迦葉菩薩稱為老子淨光童子菩薩稱為仲尼儒童菩薩稱為顏回佛說空寂所問經及天地經皆云吾迦葉在彼為老子號無上道淨光在彼號仲尼為夫子漸教化儒童在彼號顏回須那經云吾入滅千載之後教流於東土王及人民奉戒修善者衆出藏經明字函興正録云周靈王二十一年十一月四日生孔子年譜云周二十二主靈王二十一年十一月四日孔子生於兗州鄹邑平鄉闕黨里緝事記靈王在位二十七年庚戌二十一年十一月初四日時老子五十五歲孔子生於魯國兗州鄹邑平鄉晉昌里生而有髭身長九尺六寸腰大十圍手垂過膝河目海口龍顏方顙鳳顒燕領虎視雷聲有中和之德衣莊而嚴色溫而厲如世家說父叔梁紇母顏氏徵史記世家曰其先宋人也適周道衰微淳風墜地周流天下周流天下而化行導高而無位夫子有君師之德無君師之位伐樹於宋孔子嘗談道於宋國樹下宋人伐樹削跡於衛孔子過衛國人削其腳跡見辱於陽貨陽貨謂孔子曰懷其寶而迷其邦可謂仁乎好從事而亟失時可謂智乎被誚於接輿楚狂接輿見孔子而歌曰鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而畏於匡人夫子遊於匡宋人圍之數匝子絃琴而不輟子路入見曰夫子何娛耶宋人欲殺夫子矣子推琴而謂子路曰由來吾語汝吾諱窮久矣而不免命也求通久矣而不得時也當堯舜之時天下無窮人非知得也當桀紂之時天下無通人非知失也世適然夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死如視生烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也是以吾今雖難於此而不怖故絃琴而樂也論語曰天生德於豫匡人其如豫何困於陳蔡論語子在陳絶糧從者病莫能興窮詞於盜跖受毀於桓魋桓魋宋司馬也欲害孔子子曰天既賦我以如是之德桓魋其奈我何年七十有三而終於魯孔子年七十三薨於魯葬於城北今孔林是也其道本乎道德仁義禮樂夫子以行其道也則本於堯舜無為自然之道德夫仁者心之德愛之禮義者心之智事之宜禮者天理之節文人事之儀則樂者移風易俗而主於和也恭儉溫良慈讓恭者莊敬也儉者節制也溫者和厚也良者易直也慈仁而有愛及人也讓者謙遜也文行忠信子以四教文行忠信教人以學文修行存忠信也忠信為人之本也祖述堯舜遠宗堯舜之道憲章文武近守文武之法刪詩書刪除削也定公元年季氏強僭其陽虎作亂專政夫子退而削去詩中繁文異辭書中三墳三典定禮樂夫子適問篇問禮於老聃訪樂於萇弘然後定其禮樂讚易道讚周易而講明天道及說卦文言繫辭等補春秋韓宣子適魯見孔子曰易象與魯春秋蓋周之舊典也何不修之因魯史策書成文就加筆削所補之者人道恢王道備矣作孝經與曾子所言者是也理欹器孔子觀於魯桓公之廟有欹器焉問於守廟者曰此謂何器對曰此蓋為宥坐之器也子曰吾聞宥坐之器虛則欹中則正滿則覆聖人以為至誠故常置之於坐測顧謂弟子曰試注水焉乃注之果然中則正滿則覆夫子喟然歎曰嗚呼夫物焉有滿而不覆也哉子路進曰敢問持滿有道乎子曰聰明聖智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謹此所謂損之又損之之道也受道於漁父事如莊子漁父篇問禮於老聃正三綱三綱者父子君臣夫婦明五紀五紀者仁義禮智信配天祀帝享祖尊親事出孝經僕妾竭其歡心孝經治家者不敢失於臣妾而況於妻子乎故得人之歡心臣子盡其忠孝事父母能竭其力事君臣能致其身居家理治長幼順從孝經居家理故治可移於君事兄弟故順可移於長身揭日月之明揭負也言身負其道如日月之同明道歷乾坤之固夫子道德歷代封諡如天地之永固此略其實也此乃略少而言夫子之實跡也然聖人之道仰之彌高論語顏子喟然歎曰聖人之道仰之彌高不可及鑽之彌堅鑽彌堅不可入瞻之在前忽然在後在前在後恍惚不可以為象此顏子深知夫子之道無窮無盡無形無體而歎之也居則善地心則善淵迎之無首隨之無後老氏道體玄妙而不可及也生而無生滅而無滅釋氏不生不滅之道也離相寂然絶諸戲論此形容釋氏道體玄妙不可及也且誰能果知其升降隱顯原始返終之道也此總結三教之妙而謙辭云且今誰敢言盡知其高低明暗原其始生而盡其返終之道也哉客稽首再拜曰非子之說吾不得聞聖人至道如此其大者也
