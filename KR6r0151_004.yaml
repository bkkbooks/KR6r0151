body:
  text: 金臺大慈恩寺西域師子比丘述注殊見第十四此篇因所見差異而殊別故曰殊見客曰子之所言佛道尊崇無聖可上此因第二第三篇中言佛之法身廣大證聖極尊以為問也或有人曰佛之為教也其文富贍其說宏遠義句廓落旨趣幽深瀚漫周遮難用難信以是而毀為之奈何謂佛教如此則大難用而尤難信因此而有謗毀者為之奈何妙明曰至味難調衆口大音不合群耳夫蚯蚓食土而甘於土豈知有五味之和犬豕食糞而美於糞豈知有醪醴之味悲夫不知知之未必為食也狗有懸爪為犬若蚯蚓置之於五味犬豕飲之以醪醴彼必反以為毒者何也蓋非適其所養若蚯蚓投之以污池犬豕飼之以糟漿彼必宛轉詰屈掉尾奮蹄從而悅之者何也蓋適其所養之道也宛轉詰屈乃蚯蚓動轉貌掉尾奮蹄乃犬豕悅豫貌且承雲黃帝樂咸池夏樂九韶舞樂大濩湯樂大武周武王樂樂之至也若調以五音之和奏以九成之美歌詠先王之風致若景鳳翔慶雲浮甘露降醴泉出鳳凰來儀鳥獸率舞堯使夔典樂擊石百獸率舞舜簫韶九奏鳳凰來儀若求其和者必莫知應者何也蓋乖其所聽也若以上文五樂求其應和而無者何蓋為乖異於聽者也若操之以鄭衛之音詠之以世俗之風曲合時習韻叶巴歌使其聽者必不待教而自知其和者何也蓋適其所知也鄭衛之歌曲乃淫蕩之音合其世俗之習如巴歌知和而多者何為也蓋由順其所知也且舜禹之君可謂聖矣楊朱從而讎之讐讟謗也列子楊朱曰舜耕河陽陶於雷澤四體不得暫安口腹不得美厚父母之所不愛弟妹之所不親行年三十不告而娶及受堯之禪年已長智已衰商均不才禪位於禹戚戚然以至於死此天人窮毒者也鯀治水土功績不就殛諸羽山禹纂業事讐惟荒度土功子産不字過門不入身體偏枯手足胼胝及受舜禪卑宮室戚戚然至於死此天人之憂苦者也仲尼之德可謂仁矣桓魋從而害之論語桓魋欲害孔子子曰天生德於豫桓魋其如豫何魯臧倉毀隔孟子孟子曰臧氏之子焉能使豫不遇哉公伯寮訴仲由訴譖辭公伯寮魯人也仲由即子路論語云伯寮訴子路於季孫其若仰而噀天徒污其面也以楊朱讐舜禹桓魋害孔子臧倉毀孟子伯寮訴子路等喻客之毀佛者何異仰而唾天徒污自己面也夫聽樂者聞清商而為之宮角過不在於扣絃而聞之不審也求玉者見和璧而為之碔玞賤非關於至寶而見者不明也和璧史記卡和得荊山之璞進楚文王武王二王皆刖足後進成王使玉人琢之果得美玉號連城之寶碔玞似玉之石也若將和璧為碔玞者非干玉賤乃見者不明也神蛇能斷而復續不能使人不斷也異物志云神蛇斷而復續靈龜審人之禍福自不免刳剔之災列子宋元君夢人被髮曰豫被清江河伯之所漁請君救之覺而外巡果見網得白龜圓五尺君欲活之卜者曰龜有七十二鑽以卜吉凶如此則雖能卜人之禍福不能自免刳剔之災患至道恢弘聖人極唱出世妙典非俗所知不為譽者貴而毀者賤大聖教典下以稱譽而貴毀謗而賤行不行時也行與不行各有其時若孔子不得君師之位也信不信機也信與不信唯在機會若盜跖不受孔子之化也譬如荷鍤以平太行抱石而塞巨浸其於功也不亦勞乎巨浸海也客之謗佛譬如有人負荷鍤钁欲要平治太行之山抱取塊石而要塞填大海為此之功力者不亦勞而難乎隨宜第十五此篇隨順合宜而答後曰隨宜客曰子言佛教義高嵩泰理濬江海文同翻錦句若揀金奚不以佛經答吾所問而復以詩書合異於同耶妙明曰牟子云渴者不必投江海而飲饑者不必待敖倉而飽道為智者設辨為達者通書為曉者傳事為見者明吾以子知其意故引而申之若說佛經以答吾子譬如盲者耀五色聾者奏五音也且師襄師文伯牙瓠巴叔夜古之善鼓琴者其學雖切不能成無絃之曲列子瓠巴鼓琴而鳥舞魚躍師襄乃師文之師也但能撫琴當春之時扣商絃以召南呂八月之令涼風忽至草木成實及秋而扣角絃以激夾鍾乃二月節令而溫風徐回草木發榮盛當夏而扣羽絃以召黃鍾乃十一月節令霜雪交下川池暴烈及冬而扣徵絃以激蕤賓五月節令而陽光盛烈堅氷立散將終命扣宮而總四絃則景風翔慶雲浮甘露降醴泉湧然此善操而不能成無絃之曲調也甘𪚱飛衛紀昌逢蒙蒲且子古之善射者其藝雖神不能彀無弦之弓彀古侯切張弓也列子甘𪚱古之善射者彀弓而獸伏鳥下弟子飛衛學射甘𪚱而巧過於師紀昌又學射於飛衛後進其術昌欲謀殺飛衛二人交射中路矢逢相觸而墜於地衛矢先盡昌有一矢既發衛以棘刺之端扞之而無差其藝雖神不能張無弦之弓狐貈音鶴雖溫不能暖無氣之人狐貈皮毛雖溫暖不能暖死而無氣之人水土雖澤不能秀無根之木水土雖然潤澤難發秀無根之木佛法雖懿不注薄信之耳佛法雖然懿美而不能化導入不信人之耳子之信道未篤故多惑志吾安敢以大聖微旨答子之問耶昔公明儀為牛彈清角之操清角者牛耳不能聞聲唯以角聽故云彈清角之操也伏食如故非牛之不聞不合其耳也其牛低首而食草如故轉為虻蟲之聲犢子之鳴轉為操虻蟲飛來之聲又操犢子尋母鳴聲牛即掉尾奮耳蹀躞而聽者何也蓋適其所知也蹀躞蹄動貌牛聞此聲遂乃掉動其尾奮立兩且四足皆動如此聽之者何為也大概順其所知者也蹀音牃躞音泄以是故吾以詩書曉子矣不用佛經答因子曉達六經諸子是以引之使子易曉優劣第十六此篇謂王喬簫史與摩騰竺法比之勝弱故曰優劣客曰王喬簫史仙也王喬後漢人為葉縣令每顯神異乘鳧而往來簫史秦穆公時人善吹簫夫婦隨鳳凰而飛去摩騰竺法蘭僧也其道等乎客謂此二仙二僧其道德亦有等乎妙明曰止乎且止也幸以晏然吾不欲平地起風波之千丈也不當得而得曰幸幸以無事坐却論其優劣高低則正是無風起浪客曰願略舉似啓吾茆塞啓開也客謂略少舉似法要開我胸中茆塞妙明曰夫行舟者識水之淺深行舟者要識水勢之深淺控御者知地之高下御車者須要知地之曲直高低也學道者達人之優劣學道者之人要通達為師之勝弱也若不分優劣則不明人之邪正也吾尋常方袍釋子我乃是尋常著寬服之僧管窺可隘如筆管之明可窺隘而不足洞明也牆面無知無學無知者如面牆但以爝火之光照燭無遠爝火者小火把也謙曰我若火把小光用照於夜則其照燭明亮莫之能遠何敢評先德升降之道乎升降者高低也既如管窺爝火焉敢評論先輩然以蒲牢含響為長鯨扣之則莫得悶其聲也海有大魚名鯨海島有獸名蒲牢蒲牢畏鯨鯨一躍蒲牢輒大鳴吼故鐘上鑄蒲牢之形擊鐘之木以為鯨魚之形故問者如鯨答者如蒲牢之應聲也悲夫桀紂之犬足以吠堯諡法翼善博聖曰堯又善行德義曰堯悲夫歎辭也桀紂昏主舜堯聖君桀紂之犬雖識其主不知主之昏然堯舜雖明犬不知聖明故吠之佛喻堯謗者喻犬楊墨之徒足以謗舜然居今之俗多以同群逐塊罔審聖道階乎上下而於戡弱戡苦耽切伐也謗毀也諡法仁聖威明曰舜列子楊朱謗舜今以佛喻舜謗者喻楊朱居今常俗喻群狗狗見人丟去甎土之塊逐而趕之也言客無能評審聖道有階級上下而不同及於戡勝弱劣之不等乎懵然無辨懵莫紅切心暗昏而不能辨別於高下也縱有懷其藻鑑評而詣其實者而於叢惑奚能允哉藻淨也鑑鏡也叢音從今之有人縱然明達如淨鏡評論詣至於真實無妄之處而叢叢之衆皆以迷惑何能允信至於聖人之大道哉居吾將告汝令客坐而告語之夫騰蘭之為僧也道窮四諦智皎三明其智慧皎然明白有三一宿住智正明二生死智正明三漏盡智正明也獲六神通具八解脫能飛行往來改易形體飛行往來者神通也改易者變化也形體乃身形體貌也或成老耄說文曰七十曰老曲禮曰八十九十歲曰耄或示孺孩說文曰會行而食乳曰孺始生曰孩或滅或生或現死滅或現生存延促自在延長也促短也既有神通長短隨意也又能撼天地搖撼則動於天地移山嶽改變遷移山嶽覆江海翻江覆海入水火入水不溺入火不燒千變萬化不可窮極荀子云改其舊質謂之變易其形貌謂之化如此千變萬化無有窮盡以定力所資無施不克克能也其神通妙用蓋由定慧之力無施為而無有不能頗有生逢供養者而於見世能財能壽能貴矣若摩騰竺法蘭之妙用一切有生逢之而供養則現世今生與之財寶乃至長壽尊貴矣豈直與乘鳧跨鳳者同日而語也如此神聖豈直與駕鳧鳥騎鸞鳳千年不死之鬼比類而論哉夫三桓之與三王以此比之史記三桓者孟孫季孫叔孫也皆桓公之後也三王者夏商周三代聖君也以王喬簫史喻三桓摩騰竺法喻三王也五霸之與五帝史記五者齊桓晉文秦穆宋襄楚莊是也五帝者少昊顓頊高辛唐堯虞舜是也以五帝喻摩騰法蘭五喻王喬簫史也是皆君也而無階乎然五五帝皆即君位高低豈無階級乎陽貨之與仲尼陽貨季氏家臣也孔子乃千古文章之祖萬代帝王之師也楊墨之與荀孟孟子曰楊朱但知愛身而不知有致身之義故無君也墨翟兼愛而無差等視親亦於衆人無異是無父也故無父無君則人道絶滅也是皆儒也而無梯乎徐福之與河上秦紀徐福為道士習仙秦始皇令齎童男童女海上求神仙不死之藥舟於海中巡致湮溺河上者河上公也漢文帝以師禮之關尹之與老聃史記列仙傳函谷關令尹喜乃周之大夫老子西遊至關受道德二篇是皆道也而無降乎徐福尹喜比河上公老子者皆言有道之士豈無階降者乎丘垤之與泰山垤從結切螻蟻出土之也泰山者五嶽之一也以喬史之道比之騰蘭亦若蟻蛭之比於泰山行潦之與江海行潦道上無源之水豈能比於江海水走獸之與麒麟麞鹿等獸豈能比於麒麟飛鳥之與鳳凰鴉雀等禽豈能比於鳳凰是皆類也而無異乎羊皮之與虎鞟鞟音廓皮去毛曰鞟斑紵之與綿繡斑紵者布文斑白者錦繡者考工記曰金線織文為之錦五色綵備為之繡是皆文也而無殊乎夫聖也凡也凡聖二途不可濫也孟子曰大而化之謂之聖韻義曰輕微常俗謂之凡故凡聖二途不可相濫而混同也故有大聖小聖上凡下凡凡聖各有等級大聖則歸乎覺皇覺皇即佛也故稱為大聖小聖則存乎應真即四果小聖也蘭騰則吾宗小聖矣摩騰竺法蘭乃釋門之小聖也凡者非聖之稱也上凡則該乎天衆上凡者乃天民衆也下凡則稱乎兆民十億曰兆下凡乃世間之民也雖簫史之徒白日輕舉未必與乎天衆也與去聲參與也設與亦非聖也敢以此道而擬於聖人乎若果以乘鸞跨鳳稱之為聖則仲尼老聃不為聖也夫聖者通也夫聖人者一切通達也非乘鸞跨鳳之稱也凡者常也凡常者尋常流俗也寂然不動感而遂通變化無方威靈莫測謂之為聖繫辭云寂然不動心之理也感而遂通體之用也懵然而生謂生不知來處惛然而死謂死不知去處營營於衣食營營者往來不已之貌謂貪衣食之人也戚戚於名利論語云君子坦蕩蕩小人常戚戚憂慮不遂之貌謂貪名貪利之人也皆死皆生世之常俗為貪名利衣食皆在生死之中常於生死以生死為尋常之事謂之曰凡由此謂之凡也且天人垂死五衰相現而有破面之忿因果經云天人身淨不受塵垢有大光明心常歡悅無不適意福盡之時五衰相現一華冠萎脫二兩腋汗流三不樂本座四眷屬離散五身光自絶故破面之忿謂煩惱忿怒現於面也皆謂之貪其名利而不易棄也一切天人皆因貪其天上之名利快樂而不能容易棄捨也安得不為夫凡乎嗚呼彼寡聞陋智者禮記曰獨學無友則孤陋寡聞統以上天所居之衆例為聖者若上天所居人衆例為大聖人而吾宗脫白小衲莫不抵掌而嗤其謬也已矣我釋門中才脫去俗人白衣而初著緇衣者無不拍手笑為狂謬之談也已先知第十七此篇預明西域生佛故曰先知客曰子之言佛其道大矣敢問漢夢以前還有知之者乎漢明帝夢見金人飛入殿庭前此曾有知西方有佛者也妙明曰遼哉問也遼者遠也在昔周昭王甲寅二十四年四月八日夜有大光明來照殿庭王問太史蘇由曰太史通天象之官蘇由姓名昨夜有光來照殿庭是何祥瑞蘇由對曰西方有聖人生此所現之靈瑞也王曰於國何如於我國家不知善惡何如由曰即今無事後一千年聲教被於此土由謂一千年後所談經教流傳此土遂以此事記勒諸石彼時遂用此事載記勒石埋於南郊埋於祭天之南郊以待驗至後漢明帝甲子永平七年僅千歲矣僅才也緝事記永平四年辛酉明帝夢佛至戊辰十一年至此此先知之一也已上所明乃先知一也又周穆王壬申五十二年二月中有白虹一十二道南北貫通連宵不滅虹橋光也其光相貫徹南北日夜不滅王問太史扈多曰是何瑞也扈對曰此西方大聖人入滅所現相也緝事記穆王名滿昭王之子在位五十五年壬申五十二年二月十五日世尊涅槃王曰吾常以此為患今既滅矣吾何患哉扈多曰王何必患前代太史蘇由嘗志勒于石曰千年之後聲教流被此土方今七十九年矣王奚患哉此先知之二也商太宰問孔子曰夫子聖者歟問孔子聖人歟孔子曰聖則丘何敢然丘夫子名何敢然者謙辭也丘則博學多識者也又曰三王聖者歟孔子曰三王善任智勇者善能任用智勇以治世者也聖則丘不知聖不聖丘不知也曰五帝聖者歟孔子曰五帝善任仁義者善能任用仁義以治天下聖則丘不知聖不聖丘不知也曰三皇聖者歟伏羲神農軒轅孔子曰三皇善任因時者善能任用因順於時聖則丘不知聖不聖丘不知也商太宰大駭曰然則孰為聖乎太宰謂三皇五帝三王皆非聖人孰為聖人乎所以大驚駭也孔子動容有間動容者默而心想眉目動而形容之貌曰西方有聖者焉不治而不亂此明如來無為之大端也謂不以法度所治自不作亂也不言而自信非言教勸化而自敬信也不化而自行非教化而自行其道也蕩蕩乎民無能名焉蕩蕩廣遠之貌故如來之道妙民不能稱名焉丘疑其為聖不知真聖歟真不聖歟夫子有推尊之意為此不定之辭此先知之三也嬴秦始皇帝時有梵僧室利房等二十七人來秦時帝方急其并吞七雄爭勝七雄者秦齊燕趙韓魏楚也甲兵相持不遑崇信遑暇也鎧甲之兵正相殺時不遑間暇而崇敬信受也反為譎誕秦主反以譎詐虛誕遂以房等𨻼而執之遂將房等皆於𨻼牢而執禁之夜有金甲神人從空而下以金鎚擊鎖援僧而去此先知之四也漢護左都水使劉向曰吾搜撿藏書緬尋太史創造列仙圖黃帝而下六世迄于今得仙道者七百餘人撿實得一百四十六人其七十四人已見佛經矣此先知之五也前漢武帝元狩三年於長安城西南鑿昆明池帝欲伐毗明國彼國人善水戰故鑿池以習之得黑灰問東方朔朔曰此非臣能知陛下可問西域胡僧必能知之帝遂遣人往問僧曰乃劫壞時所積灰耳此先知之六也若子獨於諸說而不知之者乎且孔子生於東周佛則生於西域相去綿遠其玄會默識驗若親覿非同聲相應其孰能懸知如此之遠者乎周易乾卦文言九五飛龍在天利見大人何謂也子曰同聲相應同氣相求尊釋第十八此篇客方崇佛故曰尊釋客曰仲尼默識能仁識音志記也謂不言而存諸心也一云識者知也不言而心解也梵語釋迦此云能仁商太宰所問夫子默知佛也既得聞焉敢問老聃還知西方有聖人者無再敢問老子還知西方有佛聖否妙明曰善哉汝之問也吾昔嘗遊華清宮臨潼縣鬪寶山有華清宮道士鴻濛老人邀豫登玉女閣啓經藏出函匣觀道籍録得西升經首帙讀其文曰吾師化遊天竺善入泥洹泥洹者涅槃也豫謂鴻濛曰若指佛歟鴻濛曰吾不敢果以為然也豫曰若非指佛誰為老氏之師也又得古道元皇歷云天竺有古皇先生即吾師也若此言者皆指佛言也蓋老子知天竺之聖所以再三稱之也善入泥洹化遊天竺因善入泥洹而化遊本國五天竺也今已返神還乎無名言佛雙林入滅今乃返本還源復其無名之妙絶身滅影不始不終絶身滅影復歸不始不終之理綿綿長存吾今遊矣綿綿不斷而長存者也故老子曰今去遊矣此正是過函谷關之時也又得道士法輪經云若見沙門思念無量願早出身以習佛真若見佛圖思念無量當願一切普入法門明解法度得道如佛又得靈寶消魂安志經云道以齊為先勤行當作佛故設大法橋普度諸人物諸者助辭於也又得金闕朝元經云願採優曇華願燒旃檀香供養千佛身稽首禮定光我生何以晚泥洹亦何早不見釋迦文心中常懊惱豫在北京靈濟宮西北廊畫壁上見一僧座一人禮拜豫問本宮道士此何也士曰此靈濟真君因中曾禮定光佛為師也肅宗三教畫讚云唐肅宗皇帝作三教讚儒吾之師曰魯仲尼仲尼師聃龍孔子家語適周篇子曰周有老聃博古知今是吾師也既問禮而歎曰老子猶龍也吾不知聃師竺乾善入無為吾於昔年未明其事不知聃龍師竺乾善能入無為者即佛也稽首正覺梵語三菩提此云正覺即佛也吾師師師故稽首正覺世尊乃我師師之師也以如是言應正了知如此言應當了知是意老聃亦知竺乾之國有佛聖人可謂明矣子獨不知乎夫太上生東夏釋迦現西乾老子生於東國佛乃生於西天地殊五萬餘里年隔十六君王周定王丙辰二年二月十五日生老子位經十六王者歷恭懿孝夷厲定幽平桓莊僖惠襄項匡年記三百四十五載雖殊地而處別代而出其冥會默契如此之綿密非聖慧遐鑑道德玄同其孰能與於此乎
