body:
  text: 折疑論敘鄉貢進士白水屈蟠撰法師名子成字彥美號妙明京兆陵人也少時為儒壯而從釋其性愛書史喜翰墨樂遊學好著述每與賢士大夫詩詞唱和一聯一句落在叢席人多傳之如鸚鵡詩云學得人言字字明便能巧語為通情不知身在樊籠裏猶向堂前弄舌輕晝寢云夢魂不管擎書手一帙南華墮枕邊閑遊云家家明月誰無分處處青山我有緣水心亭云綠芰青荷香滿池環亭冷浸碧瑠璃高軒矮榻無纖暑臥看清波浴鷺鷥其長篇短偈例皆如此尤能洞明本宗佛法予昔嘗與縣大夫張昂請註心經五日而成萬二千言辭理精當不為不多得又嘗綴述本色法事文集僅二百首語句雄麗旨意渾成同袍得之囊畜不出抑為艱得無意多傳頃以兵火之亂匿跡山林嘗與來客問難詰折事盡終始遂錄成軸名曰折疑論首之以序問終之以會名凡二十篇言簡而理當文約而義豐涵詠六經略備諸子每一篇之中其引類證斷決折疑理甚明白若非具三昧辯才其孰能致於此乎予與妙明為不請友其有年矣大凡著作不我之慳故於敘引母俟召而云時辛卯中秋八日書折疑論敘終
